 
nop:
  debug: true
  auth:
    jwt:
      # 安全：生产部署必须通过环境变量 JWT_ENC_KEY 注入唯一密钥，禁止使用占位默认值
      enc-key: ${JWT_ENC_KEY:3b0ff92c103f4e2faf4d1e7d3efa3ea9}

    login:
      # 安全：默认管理员账户不再自动创建。首次部署请通过初始化脚本或运维流程手动创建管理员，
      # 避免默认账户 nop/123 在生产环境被未授权访问。
      allow-create-default-user: false

    site-map:
      static-config-path: /nop/main/auth/app.action-auth.xml
      cache-timeout: 1s
      support-debug: true

  web:
    # 启用页面模型校验，防止破损或被注入的页面模型进入运行时
    validate-page-model: true

  orm:
    init-database-schema: true

  datasource:
    driver-class-name: org.h2.Driver
    jdbc-url: jdbc:h2:./db/erp
    username: sa
    password:

  # 生产环境关闭 GraphQL Schema introspection，避免泄露内部结构供攻击者侦察
  graphql:
    schema-introspection:
      enabled: false

# devservices 会启用testcontainers来管理测试数据库
quarkus:
  devservices:
    enabled: false

  datasource:
    devservices:
      enabled: false

  http:
    host: 0.0.0.0
    cors: true

  log:
    level: INFO

    category:
      "io.nop":
        level: INFO
