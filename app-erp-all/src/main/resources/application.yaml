
nop:
  debug: true
  auth:
    jwt:
      enc-key: ${JWT_ENC_KEY:3b0ff92c103f4e2faf4d1e7d3efa3ea9}
    login:
      allow-create-default-user: false
    site-map:
      static-config-path: /nop/main/auth/app.action-auth.xml
      cache-timeout: 1s
      support-debug: true
  web:
    validate-page-model: true
  orm:
    init-database-schema: true
  datasource:
    driver-class-name: org.h2.Driver
    jdbc-url: jdbc:h2:./db/erp
    username: sa
    password:
  graphql:
    schema-introspection:
      enabled: false

quarkus:
  devservices:
    enabled: false
  datasource:
    devservices:
      enabled: false
  http:
    host: 0.0.0.0
    cors: true
    port: 8011
  log:
    level: INFO
    category:
      "io.nop":
        level: INFO
  dev:
    watch:
      enabled: false
  live-reload:
    enabled: false

"%dev":
   nop:
     auth:
       login:
         allow-create-default-user: true
