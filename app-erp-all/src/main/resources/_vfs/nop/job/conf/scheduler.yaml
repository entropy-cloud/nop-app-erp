enabled: true
jobs:
  - jobName: erp-fin-ar-ap-auto-recon
    displayName: Finance AR/AP Auto Reconciliation
    description: 每日凌晨触发 AR/AP 自动核销（FIFO 全 partner）；cron 经 erp-fin.ar-ap-auto-recon-cron 配置门控
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpFinAutoReconJob
      method: execute

  - jobName: erp-ast-depreciation
    displayName: Assets Batch Depreciation
    description: 每月 1 日 02:00 批量计提折旧（当前自然月）；cron 经 erp-ast.depreciation-cron 配置门控
    trigger:
      cronExpr: "0 0 2 1 * ?"
    invoker:
      bean: erpAstDepreciationJob
      method: execute

  - jobName: erp-mnt-due-visit-generation
    displayName: Maintenance Due Visit Generation
    description: 每日凌晨扫描 active 维护计划生成到期访问；cron 经 erp-mnt.due-visit-cron 配置门控
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpMntDueVisitJob
      method: execute

  - jobName: erp-cs-sla-scan
    displayName: Customer Service SLA Overdue Scan
    description: 每分钟扫描 SLA 超时工单建 ESCALATE 审计 + 升级通知；cron 经 erp-cs.sla-scan-cron 配置门控
    trigger:
      cronExpr: "0 * * * * ?"
    invoker:
      bean: erpCsSlaScanJob
      method: execute

  - jobName: erp-fin-cash-forecast-refresh
    displayName: Finance Cash Forecast Refresh
    description: 每日凌晨聚合未核销 AR/AP + 票据到期项刷新现金预测；cron 经 erp-fin.cash-forecast-cron 配置门控
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpFinCashForecastJob
      method: execute

  - jobName: erp-mfg-crp-run
    displayName: Manufacturing CRP Load Calculation
    description: 每日凌晨按当月窗口计算 CRP 产能负荷快照（全工作中心）；cron 经 erp-mfg.crp-run-cron 配置门控
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpMfgCrpRunJob
      method: execute

  - jobName: erp-mfg-jobcard-auto-generate
    displayName: Manufacturing APS Schedule to JobCard Auto Generation
    description: 每日凌晨扫描「APS已排程但未生成工序卡」的工单批量建卡；双层门控——cron 经 erp-mfg.jobcard-auto-generate-cron 配置 + 总开关 erp-mfg.jobcard-auto-generate-on-schedule（默认 false）
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpMfgJobCardAutoGenJob
      method: execute

  - jobName: erp-crm-forecast-recalc
    displayName: CRM Sales Forecast Recalc
    description: 每日 03:00 重算当前 OPEN 预测期间的销售预测；cron 经 erp-crm.forecast.recalc-cron 配置门控
    trigger:
      cronExpr: "0 3 * * *"
    invoker:
      bean: erpCrmForecastRecalcJob
      method: execute

  - jobName: erp-crm-lead-scoring-recalc
    displayName: CRM Lead Scoring Recalc
    description: 每日 02:00 迭代 active 线索批量重算评分（单线索失败隔离）；cron 经 erp-crm.lead-scoring.schedule-cron 配置门控
    trigger:
      cronExpr: "0 2 * * *"
    invoker:
      bean: erpCrmLeadScoringRecalcJob
      method: execute

  - jobName: erp-crm-event-reminder
    displayName: CRM Event Reminder
    description: 每 15 分钟扫描 PLANNED 状态到期事件（now ≤ startDateTime ≤ now+60min）派发提醒通知；cron 经 erp-crm.event-reminder-cron 配置门控
    trigger:
      cronExpr: "0 0/15 * * * ?"
    invoker:
      bean: erpCrmEventReminderJob
      method: execute

  - jobName: erp-crm-sequence-overdue
    displayName: CRM Sequence Overdue Scan
    description: 每日 06:00 扫描连续逾期 ≥ max-overdue-steps 的序列进度派发提醒通知；cron 经 erp-crm.sequence.overdue-check-cron 配置门控
    trigger:
      cronExpr: "0 0 6 * * ?"
    invoker:
      bean: erpCrmSequenceOverdueJob
      method: execute

  - jobName: erp-crm-funnel-aggregation
    displayName: CRM Funnel Aggregation
    description: 每日 03:30 全量刷新漏斗快照（LeadFunnel 头 + FunnelStageMetrics 阶段明细）；cron 经 erp-crm.funnel.aggregation-cron 配置门控
    trigger:
      cronExpr: "0 30 3 * * ?"
    invoker:
      bean: erpCrmFunnelAggregationJob
      method: execute

  - jobName: erp-cs-csat-reminder
    displayName: Customer Service CSAT Survey Reminder
    description: 每日 02:00 扫描未响应/过期 CSAT 调查派发提醒通知；cron 经 erp-cs.csat-reminder-cron 配置门控
    trigger:
      cronExpr: "0 0 2 * * ?"
    invoker:
      bean: erpCsCsatReminderJob
      method: execute

  - jobName: erp-cs-entitlement-expiry
    displayName: Customer Service Entitlement Expiry Scan
    description: 每日 01:30 扫描到期前权益派发提醒通知 + 自动停用已到期权益（isActive=false）；cron 经 erp-cs.entitlement-expiry-cron 配置门控
    trigger:
      cronExpr: "0 30 1 * * ?"
    invoker:
      bean: erpCsEntitlementExpiryJob
      method: execute

  - jobName: erp-prj-pnl-calc
    displayName: Projects PnL Aggregation
    description: 每日凌晨扫描活跃项目批量汇总损益（Billing 收入 + CostCollection 四类成本 → ErpPrjProjectPnl）；双层门控——cron 经 erp-prj.pnl-calc-cron 配置 + 总开关 erp-prj.pnl-auto-calc-enabled（默认 false）
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpPrjPnlCalcJob
      method: execute

  - jobName: erp-qa-spc-sampling
    displayName: Quality SPC Sampling
    description: 每小时扫描 active 控制图批量采集子组样本（ErpQaInspectionLine.measuredValue → ErpQaSpcSample）并重算控制限；双层门控——cron 经 erp-qa.spc-sampling-cron 配置 + 总开关 erp-qa.spc-enabled（默认 false）
    trigger:
      cronExpr: "0 0 * * * ?"
    invoker:
      bean: erpQaSpcSamplingJob
      method: execute

  - jobName: erp-qa-spc-capability
    displayName: Quality SPC Capability Analysis
    description: 每日 02:00 批量计算控制图过程能力指数（Cp/Cpk/Pp/Ppk → ErpQaSpcCapability），等级<ACCEPTABLE 回写 QualityGoal + 登记 RiskRegister；cron 经 erp-qa.spc-capability-cron 配置门控（受总开关 erp-qa.spc-enabled 二次约束）
    trigger:
      cronExpr: "0 0 2 * * ?"
    invoker:
      bean: erpQaSpcCapabilityJob
      method: execute

  - jobName: erp-fin-deferred-posting-sweep
    displayName: Finance Deferred Posting Sweep
    description: 每 5 分钟扫描 ErpFinPostingException PENDING 记录（retryCount<3，最近 24h）重建 PostingEvent 重试过账；cron 经 erp-fin.deferred-posting-sweep-cron 配置门控（O-2 兜底扫描重试）
    trigger:
      cronExpr: "0 0/5 * * * ?"
    invoker:
      bean: erpFinDeferredPostingSweepJob
      method: execute

  - jobName: erp-hr-contract-expiry
    displayName: HR Contract Expiry Scan
    description: 每日 01:00 扫描到期前合同派发提醒通知 + 推进已过期合同状态 ACTIVE→EXPIRED；cron 经 erp-hr.contract-expiry-cron 配置门控
    trigger:
      cronExpr: "0 0 1 * * ?"
    invoker:
      bean: erpHrContractExpiryJob
      method: execute
