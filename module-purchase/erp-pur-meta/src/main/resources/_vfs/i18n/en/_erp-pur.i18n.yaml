    erp-pur/invoice-type: Invoice Type
dict.option.label:
  erp-pur/doc-status:
    '10': Draft
    '20': Effective
    '30': Voided
  erp-pur/approve-status:
    '10': Unsubmitted
    '20': Submitted
    '30': Approved
    '40': Rejected
  erp-pur/paid-status:
    '10': Unpaid
    '20': Partially Paid
    '30': Fully Paid
  erp-pur/receive-status:
    '10': Unreceived
    '20': Partially Received
    '30': Fully Received
  erp-pur/biz-type:
    '10': Purchase Requisition
    '20': RFQ
    '30': Quotation
    '40': Purchase Order
    '50': Purchase Receipt
    '60': Purchase Invoice
    '70': Payment
    '80': Purchase Return
  erp-pur/doc-direction:
    '10': Receipt
    '20': Issue
  erp-pur/receive-type:
    '10': Normal Receipt
    '20': Return Receipt
    '30': Freebie Receipt
  erp-pur/invoice-type:
    '10': VAT Special
    '20': VAT General
    '30': Receipt Note
