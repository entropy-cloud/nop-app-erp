
nop:
  debug: true
  auth:
    jwt:
      enc-key: 3b0ff92c103f4e2faf4d1e7d3efa3ea9

    login:
      allow-create-default-user: true # 如果用户表为空，则自动创建缺省账户nop, 密码123

    site-map:
      static-config-path: /erp/pur/auth/app.action-auth.xml
      cache-timeout: 1s
      support-debug: true

    data-auth-config-path: /erp/pur/auth/app.data-auth.xml

  web:
    validate-page-model: true

  orm:
    init-database-schema: true

  datasource:
    driver-class-name: org.h2.Driver
    jdbc-url: jdbc:h2:./db/test
    username: sa
    password:

# 支持graphql __schema查询，
  graphql:
    schema-introspection:
      enabled: true

# devservices 会启用testcontainers来管理测试数据库
quarkus:
  devservices:
    enabled: false

  datasource:
    devservices:
      enabled: false

  http:
    host: 0.0.0.0
    cors: true

  log:
    level: INFO

    category:
      "io.nop":
        level: INFO
