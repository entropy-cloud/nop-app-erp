type: page
title: "采购概览"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=本月1日"
        clearable: true
      - type: input-date
        name: endDate
        label: "结束日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=今天"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,trendChart,topNVendorChart,threeWayMatchCrud,apOverdueCrud"

  - type: service
    name: kpiService
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query($startDate:String,$endDate:String){ ErpPurDashboard__getDashboardKpi(startDate:$startDate,endDate:$endDate) }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpPurDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期采购额</div>"
              - type: tpl
                tpl: "<span class='h3 text-primary'>¥${purchaseAmount | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期订单量</div>"
              - type: tpl
                tpl: "<span class='h3 font-bold'>${orderCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>应付余额</div>"
              - type: tpl
                tpl: "<span class='h3 text-warning'>¥${apBalance | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>到货及时率</div>"
              - type: tpl
                tpl: "<span class='h3 text-success'>${onTimeRate | round:2}</span>"

  - type: chart
    name: trendChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query($months:Int){ ErpPurDashboard__getDashboardTrend(months:$months) }"
        variables:
          months: 12
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpPurDashboard__getDashboardTrend || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '采购趋势（近12月）' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['采购额'] },
            xAxis: { type: 'category', data: rows.map(function(r){return r.month;}) },
            yAxis: { type: 'value' },
            series: [
              { name: '采购额', type: 'line', data: rows.map(function(r){return r.purchaseAmount;}) }
            ]
          }
        };

  - type: chart
    name: topNVendorChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query($limit:Int){ ErpPurDashboard__findVendorTopN(limit:$limit) }"
        variables:
          limit: 10
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpPurDashboard__findVendorTopN || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '供应商 TOP10 采购占比' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'right' },
            series: [
              {
                name: '采购额',
                type: 'pie',
                radius: ['40%', '70%'],
                data: rows.map(function(r){return {name: '供应商#' + r.supplierId, value: r.purchaseAmount};})
              }
            ]
          }
        };

  - type: crud
    name: threeWayMatchCrud
    className: m-3
    title: "三单匹配价格差异预警（阈值经 erp-pur.match-price-tolerance 配置）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpPurDashboard__findThreeWayMatchDiffAlert }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpPurDashboard__findThreeWayMatchDiffAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: invoiceId
        label: "发票ID"
      - name: invoiceCode
        label: "发票号"
      - name: supplierId
        label: "供应商ID"
      - name: varianceType
        label: "差异类型"

  - type: crud
    name: apOverdueCrud
    className: m-3
    title: "应付超期预警（阈值经 erp-dash.pur-ap-overdue-days 配置）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpPurDashboard__findApOverdueAlert }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpPurDashboard__findApOverdueAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: partnerId
        label: "供应商ID"
      - name: sourceBillCode
        label: "单据号"
      - name: openAmount
        label: "未结金额"
      - name: ageDays
        label: "账龄(天)"
