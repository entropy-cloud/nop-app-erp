type: page
title: "销售预测准确率表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: forecastId
        label: "销售预测ID"
        placeholder: "输入预测方案ID（留空聚合全部）"
      - type: button
        label: "渲染报表"
        actionType: ajax
        api:
          url: /api/GenericApi
          method: post
          dataType: raw
          data:
            query: "query($reportName:String!,$forecastId:BigDecimal){ ErpCrmReport__renderHtml(reportName:$reportName,data:{forecastId:$forecastId}) }"
            variables: { reportName: "forecast-accuracy", forecastId: "${forecastId}" }
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$forecastId:BigDecimal){ ErpCrmReport__download(reportName:$reportName,renderType:$renderType,data:{forecastId:$forecastId}){ fileName } }"
                variables: { reportName: "forecast-accuracy", renderType: "xlsx", forecastId: "${forecastId}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$forecastId:BigDecimal){ ErpCrmReport__download(reportName:$reportName,renderType:$renderType,data:{forecastId:$forecastId}){ fileName } }"
                variables: { reportName: "forecast-accuracy", renderType: "pdf", forecastId: "${forecastId}" }
  - type: html
    id: reportContainer
    html: ""
    className: m-3
