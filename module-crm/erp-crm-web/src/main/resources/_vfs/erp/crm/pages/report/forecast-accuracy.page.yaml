type: page
title: "销售预测准确率表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: forecastId
        label: "销售预测ID"
        placeholder: "输入预测方案ID（留空聚合全部）"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpCrmReport__download
              method: post
              responseType: blob
              data:
                reportName: "forecast-accuracy"
                renderType: "xlsx"
                data: { forecastId: "${forecastId}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpCrmReport__download
              method: post
              responseType: blob
              data:
                reportName: "forecast-accuracy"
                renderType: "pdf"
                data: { forecastId: "${forecastId}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}forecastId:BigDecimal){ ErpCrmReport__renderHtml(reportName:${'$'}reportName,data:{forecastId:${'$'}forecastId}) }"
            variables:
              reportName: "forecast-accuracy"
              forecastId: "${forecastId}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpCrmReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
