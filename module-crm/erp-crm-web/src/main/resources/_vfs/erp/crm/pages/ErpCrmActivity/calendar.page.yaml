# CRM 活动日历（F13 非标准视图，plan 2026-07-22-0845-3 §Phase 3）。
# Phase 0 Explore (b) 裁决：原生 type:calendar 存在但 React 渲染报错（element type invalid，
# Minified React error #130）——组件可能未在该 AMIS 构建中正确导出。
# 实现期裁决：降级为「按日期分组的卡片网格」(grouped cards grid)，
# 视觉接近月历视图（每日一个卡片，含徽章 + 活动列表），保留日历核心语义。
# 原生 calendar successor 见 §Deferred。
# 数据源 ErpCrmActivity__findPage 按 activityDate。
# 注：实体实际字段为 activityDate（DATE），实现按真实字段名。
type: page
title: "活动日历"
remark: "CRM 活动按活动日期（activityDate）分组的卡片视图（月历语义）。每日一个卡片，含活动数量徽章 + 当日活动列表。类型颜色：CALL=蓝 / EMAIL=灰 / MEETING=绿 / NOTE=黄。支持按 leadId 过滤。"
body:
  - type: form
    name: filterForm
    title: "筛选"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-number
        name: leadId
        label: "线索/商机ID"
        placeholder: "过滤关联线索（可选）"
        clearable: true
      - type: button
        label: "刷新日历"
        icon: "refresh-cw"
        actionType: reload
        target: "activityCalendar"

  - type: service
    name: activityCalendar
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}lid:Long,${'$'}lim:Int){ ErpCrmActivity__findPage(filter_leadId:${'$'}lid,limit:${'$'}lim,orderBy:\"activityDate ASC\"){ items{ id activityType activityDate summary leadId lead{ companyName } } total } }"
        variables:
          lid: "${leadId || null}"
          lim: 500
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const page = gql.ErpCrmActivity__findPage || { items: [], total: 0 };
        const typeColor = {
          CALL: '#3b82f6',
          EMAIL: '#6b7280',
          MEETING: '#10b981',
          NOTE: '#f59e0b'
        };
        const typeIcon = {
          CALL: '📞', EMAIL: '✉️', MEETING: '👥', NOTE: '📝'
        };
        const rows = page.items || [];
        const byDay = {};
        rows.forEach(function(a){
          const day = a.activityDate ? String(a.activityDate).substring(0, 10) : null;
          if (!day) return;
          if (!byDay[day]) byDay[day] = [];
          byDay[day].push(a);
        });
        const days = Object.keys(byDay).sort();
        const dayCards = days.map(function(day){
          const acts = byDay[day];
          const items = acts.map(function(a){
            return {
              id: a.id,
              icon: typeIcon[a.activityType] || '•',
              color: typeColor[a.activityType] || '#6b7280',
              type: a.activityType,
              customer: a.lead && a.lead.companyName ? a.lead.companyName : '',
              summary: a.summary || ''
            };
          });
          return {
            day: day,
            count: acts.length,
            items: items
          };
        });
        return { status: 0, msg: '', data: { dayCards: dayCards, totalDays: days.length, totalActivities: rows.length } };
    body:
      - type: wrapper
        className: "m-b"
        body:
          - type: tpl
            tpl: '<div class="text-muted">${totalDays} 天 · ${totalActivities} 项活动</div>'
      - type: each
        name: dayCards
        placeholder: '<div class="text-center text-muted p-4">暂无活动记录</div>'
        body:
          - type: wrapper
            className: "m-b p-sm"
            body:
              - type: tpl
                tpl: '<div class="flex justify-between p-b-xs"><strong>📅 ${day}</strong><span class="badge badge-primary">${count} 项</span></div>'
              - type: each
                name: items
                body:
                  - type: tpl
                    tpl: '<div class="p-t-xs p-b-xs flex"><span style="color:${color};margin-right:6px;">${icon}</span><span><strong>[${type}]</strong> · ${customer} — ${summary}</span></div>'
