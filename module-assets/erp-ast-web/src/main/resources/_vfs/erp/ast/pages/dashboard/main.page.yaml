type: page
title: "资产概览"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-text
        name: periodId
        label: "会计期间"
        placeholder: "如 2026-07，留空=本月"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,categoryChart,trendChart,depreciationMissingCrud"

  - type: service
    name: kpiService
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "query($periodId:String){ ErpAstDashboard__getDashboardKpi(periodId:$periodId){ originalValue accumulatedDepreciation netBookValue periodDepreciation cipBalance } }"
        variables:
          periodId: "${periodId || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpAstDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>资产原值合计</div>"
              - type: tpl
                tpl: "<span class='h3 text-primary'>¥${originalValue | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>累计折旧</div>"
              - type: tpl
                tpl: "<span class='h3 text-danger'>¥${accumulatedDepreciation | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>资产净值</div>"
              - type: tpl
                tpl: "<span class='h3 font-bold'>¥${netBookValue | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期折旧</div>"
              - type: tpl
                tpl: "<span class='h3 text-warning'>¥${periodDepreciation | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>在建工程余额</div>"
              - type: tpl
                tpl: "<span class='h3'>¥${cipBalance | round:2}</span>"

  - type: chart
    name: categoryChart
    className: m-3
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpAstDashboard__getAssetCategoryDistribution { categoryId netBookValue } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpAstDashboard__getAssetCategoryDistribution || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '资产类别分布（按净值）' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'right' },
            series: [
              {
                name: '净值',
                type: 'pie',
                radius: ['40%', '70%'],
                data: rows.map(function(r){return {name: '类别#' + r.categoryId, value: r.netBookValue};})
              }
            ]
          }
        };

  - type: chart
    name: trendChart
    className: m-3
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "query($months:Int){ ErpAstDashboard__getDashboardTrend(months:$months){ period depreciationAmount } }"
        variables:
          months: 12
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpAstDashboard__getDashboardTrend || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '折旧趋势（近12月）' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['折旧额'] },
            xAxis: { type: 'category', data: rows.map(function(r){return r.period;}) },
            yAxis: { type: 'value' },
            series: [
              { name: '折旧额', type: 'line', data: rows.map(function(r){return r.depreciationAmount;}) }
            ]
          }
        };

  - type: crud
    name: depreciationMissingCrud
    className: m-3
    title: "折旧未计提预警（在用资产本期无 EXECUTED 折旧计划）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpAstDashboard__findDepreciationMissingAlert { assetId assetCode assetName period originalValue } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpAstDashboard__findDepreciationMissingAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: assetCode
        label: "资产编码"
      - name: assetName
        label: "资产名称"
      - name: period
        label: "期间"
      - name: originalValue
        label: "原值"
