type: page
title: "资产折旧明细表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: categoryId
        label: "资产类别ID"
        placeholder: "留空查询全部类别"
      - type: input-date
        name: startDate
        label: "开始日期"
      - type: input-date
        name: endDate
        label: "结束日期"
      - type: button
        label: "渲染报表"
        actionType: ajax
        api:
          url: /api/GenericApi
          method: post
          dataType: raw
          data:
            query: "query($reportName:String!,$categoryId:BigDecimal,$startDate:String,$endDate:String){ ErpAstReport__renderHtml(reportName:$reportName,data:{categoryId:$categoryId,startDate:$startDate,endDate:$endDate}) }"
            variables: { reportName: "asset-depreciation-detail", categoryId: "${categoryId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$categoryId:BigDecimal,$startDate:String,$endDate:String){ ErpAstReport__download(reportName:$reportName,renderType:$renderType,data:{categoryId:$categoryId,startDate:$startDate,endDate:$endDate}){ fileName } }"
                variables: { reportName: "asset-depreciation-detail", renderType: "xlsx", categoryId: "${categoryId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$categoryId:BigDecimal,$startDate:String,$endDate:String){ ErpAstReport__download(reportName:$reportName,renderType:$renderType,data:{categoryId:$categoryId,startDate:$startDate,endDate:$endDate}){ fileName } }"
                variables: { reportName: "asset-depreciation-detail", renderType: "pdf", categoryId: "${categoryId}", startDate: "${startDate}", endDate: "${endDate}" }
  - type: html
    id: reportContainer
    html: ""
    className: m-3
