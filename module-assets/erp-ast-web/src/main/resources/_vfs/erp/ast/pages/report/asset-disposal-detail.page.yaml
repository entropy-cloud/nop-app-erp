type: page
title: "资产处置明细表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
      - type: input-date
        name: endDate
        label: "结束日期"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpAstReport__download
              method: post
              responseType: blob
              data:
                reportName: "asset-disposal-detail"
                renderType: "xlsx"
                data: { startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpAstReport__download
              method: post
              responseType: blob
              data:
                reportName: "asset-disposal-detail"
                renderType: "pdf"
                data: { startDate: "${startDate}", endDate: "${endDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}startDate:String,${'$'}endDate:String){ ErpAstReport__renderHtml(reportName:${'$'}reportName,data:{startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
            variables:
              reportName: "asset-disposal-detail"
              startDate: "${startDate}"
              endDate: "${endDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpAstReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
