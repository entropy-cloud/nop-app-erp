type: page
title: "物料价格清单"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-text
        name: materialCode
        label: "物料编码"
        placeholder: "按物料编码精确过滤（留空查全部）"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}materialCode:String){ ErpMdReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{materialCode:${'$'}materialCode}) }"
                variables: { reportName: "material-price-list", renderType: "xlsx", materialCode: "${materialCode}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}materialCode:String){ ErpMdReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{materialCode:${'$'}materialCode}) }"
                variables: { reportName: "material-price-list", renderType: "pdf", materialCode: "${materialCode}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}materialCode:String){ ErpMdReport__renderHtml(reportName:${'$'}reportName,data:{materialCode:${'$'}materialCode}) }"
            variables:
              reportName: "material-price-list"
              materialCode: "${materialCode}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpMdReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
