type: page
title: "往来单位清单"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-text
        name: partnerType
        label: "往来单位类型"
        placeholder: "CUSTOMER=客户 / SUPPLIER=供应商（留空查全部）"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}partnerType:String){ ErpMdReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{partnerType:${'$'}partnerType}) }"
                variables: { reportName: "partner-list", renderType: "xlsx", partnerType: "${partnerType}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}partnerType:String){ ErpMdReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{partnerType:${'$'}partnerType}) }"
                variables: { reportName: "partner-list", renderType: "pdf", partnerType: "${partnerType}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}partnerType:String){ ErpMdReport__renderHtml(reportName:${'$'}reportName,data:{partnerType:${'$'}partnerType}) }"
            variables:
              reportName: "partner-list"
              partnerType: "${partnerType}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpMdReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
