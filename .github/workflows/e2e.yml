name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for E2E tests (overrides Playwright webServer)'
        required: false
        default: ''
      frontend_dev_mode:
        description: 'Use frontend dev mode (true/false)'
        required: false
        default: 'false'
      e2e_engine:
        description: 'E2E engine (amis/flux)'
        required: false
        default: ''

env:
  CI: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build uber-jar
        run: mvn clean install -DskipTests -Dquarkus.package.type=uber-jar
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run e2e
        env:
          BASE_URL: ${{ github.event.inputs.base_url || '' }}
          FRONTEND_DEV_MODE: ${{ github.event.inputs.frontend_dev_mode || 'false' }}
          E2E_ENGINE: ${{ github.event.inputs.e2e_engine || '' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
