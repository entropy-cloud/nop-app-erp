type: page
title: "质检合格率统计表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: materialId
        label: "物料ID"
        placeholder: "留空查询全部物料"
      - type: input-date
        name: startDate
        label: "开始日期"
      - type: input-date
        name: endDate
        label: "结束日期"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpQaReport__download
              method: post
              responseType: blob
              data:
                reportName: "inspection-summary"
                renderType: "xlsx"
                data: { materialId: "${materialId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpQaReport__download
              method: post
              responseType: blob
              data:
                reportName: "inspection-summary"
                renderType: "pdf"
                data: { materialId: "${materialId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}materialId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpQaReport__renderHtml(reportName:${'$'}reportName,data:{materialId:${'$'}materialId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
            variables:
              reportName: "inspection-summary"
              materialId: "${materialId}"
              startDate: "${startDate}"
              endDate: "${endDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpQaReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
