type: page
title: "质量概览"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=本月1日"
        clearable: true
      - type: input-date
        name: endDate
        label: "结束日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=今天"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,trendChart,defectChart,spcWarningService,spcControlChart,capaOverdueCrud"

  - type: service
    name: kpiService
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}startDate:String,${'$'}endDate:String){ ErpQaDashboard__getDashboardKpi(startDate:${'$'}startDate,endDate:${'$'}endDate) }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpQaDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期质检数</div>"
              - type: tpl
                tpl: "<span class='h3 font-bold'>${inspectionCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>合格率</div>"
              - type: tpl
                tpl: "<span class='h3 text-success'>${passRate | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>不合格数</div>"
              - type: tpl
                tpl: "<span class='h3 text-danger'>${rejectedCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>开放 NCR 数</div>"
              - type: tpl
                tpl: "<span class='h3 text-warning'>${openNcrCount}</span>"

  - type: chart
    name: trendChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}months:Int){ ErpQaDashboard__getDashboardTrend(months:${'$'}months) }"
        variables:
          months: 12
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpQaDashboard__getDashboardTrend || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '合格率趋势（近12月）' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['合格率'] },
            xAxis: { type: 'category', data: rows.map(function(r){return r.month;}) },
            yAxis: { type: 'value' },
            series: [
              { name: '合格率', type: 'line', data: rows.map(function(r){return r.passRate;}) }
            ]
          }
        };

  - type: chart
    name: defectChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}limit:Int){ ErpQaDashboard__findDefectTopN(limit:${'$'}limit) }"
        variables:
          limit: 10
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpQaDashboard__findDefectTopN || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '不合格原因 TOP（按处置决定聚合）' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'right' },
            series: [
              {
                name: '数量',
                type: 'pie',
                radius: ['40%', '70%'],
                data: rows.map(function(r){return {name: r.dispositionType, value: r.count};})
              }
            ]
          }
        };

  - type: service
    name: spcWarningService
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpQaDashboard__getSpcOutOfControlWarning }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const w = gql.ErpQaDashboard__getSpcOutOfControlWarning || {};
        return { status: 0, msg: '', data: w };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>SPC 失控图数</div>"
              - type: tpl
                tpl: "<span class='h3 text-danger'>${outOfControlChartCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>能力不足(INADEQUATE)图数</div>"
              - type: tpl
                tpl: "<span class='h3 ${includeInadequate ? 'text-warning' : 'text-muted'}'>${inadequateCapabilityCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>待处置 SPC NCR 数</div>"
              - type: tpl
                tpl: "<span class='h3 ${includeNcr ? 'text-warning' : 'text-muted'}'>${openSpcNcrCount}</span>"

  - type: chart
    name: spcControlChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}chartId:Long){ ErpQaDashboard__getSpcControlChartData(chartId:${'$'}chartId) }"
        variables:
          chartId: "${chartId || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const result = gql.ErpQaDashboard__getSpcControlChartData || {};
        const samples = result.samples || [];
        const ucl = result.ucl;
        const lcl = result.lcl;
        const cl = result.cl;
        const seriesData = samples.map(function(s){
          return { value: s.mean, itemStyle: s.isOutOfControl ? {color: 'red'} : undefined };
        });
        const markLines = [];
        if (ucl != null) markLines.push({ yAxis: ucl, name: 'UCL', lineStyle: {color: 'red', type: 'dashed'}, label: {position: 'end', formatter: 'UCL'} });
        if (lcl != null) markLines.push({ yAxis: lcl, name: 'LCL', lineStyle: {color: 'red', type: 'dashed'}, label: {position: 'end', formatter: 'LCL'} });
        if (cl != null)  markLines.push({ yAxis: cl,  name: 'CL',  lineStyle: {color: 'green'}, label: {position: 'end', formatter: 'CL'} });
        const series = { type: 'line', data: seriesData };
        if (markLines.length > 0) series.markLine = { symbol: 'none', data: markLines };
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: 'SPC 控制图：' + (result.chartName || '') + ' (' + (result.chartType || '') + ')' },
            tooltip: {
              trigger: 'axis',
              formatter: function(params) {
                let s = params[0].axisValueLabel + '<br/>';
                const idx = params[0].dataIndex;
                params.forEach(function(p){
                  s += p.marker + ' ' + p.seriesName + ': ' + p.value + '<br/>';
                });
                const sample = samples[idx];
                if (sample && sample.isOutOfControl && sample.violatedRules) {
                  s += '违规规则: ' + sample.violatedRules + '<br/>';
                }
                return s;
              }
            },
            xAxis: { type: 'category', name: '子组号', data: samples.map(function(s){return s.subgroupNo;}) },
            yAxis: { type: 'value' },
            series: [series]
          }
        };

  - type: crud
    name: capaOverdueCrud
    className: m-3
    title: "CAPA 逾期预警（阈值经 erp-dash.qa-capa-overdue-days 配置）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpQaDashboard__findCapaOverdueAlert }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpQaDashboard__findCapaOverdueAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: actionType
        label: "行动类型"
      - name: dueDate
        label: "计划完成日"
      - name: status
        label: "状态"
      - name: overdueDays
        label: "逾期(天)"
