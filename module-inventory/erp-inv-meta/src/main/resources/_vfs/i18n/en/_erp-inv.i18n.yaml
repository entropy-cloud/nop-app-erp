dict:
  label:
    erp-inv/move-status: Inventory Move Status
    erp-inv/operation-type: Inventory Operation Type
    erp-inv/move-direction: Move Direction
    erp-inv/approve-status: Approve Status
    erp-inv/batch-status: Batch Status
    erp-inv/serial-status: Serial Status
    erp-inv/reservation-status: Reservation Status
    erp-inv/picking-status: Picking Status
    erp-inv/take-type: Take Type
dict.option.label:
  erp-inv/move-status:
    '10': Draft
    '20': Confirmed
    '30': Completed
    '40': Cancelled
  erp-inv/operation-type:
    '10': Receipt
    '20': Issue
    '30': Internal Transfer
    '40': Manufactured
  erp-inv/move-direction:
    '10': Receipt
    '20': Issue
  erp-inv/approve-status:
    '10': Unsubmitted
    '20': Submitted
    '30': Approved
    '40': Rejected
  erp-inv/batch-status:
    '10': In Use
    '20': Locked
    '30': Expired
    '40': Depleted
    '50': Quality Frozen
  erp-inv/serial-status:
    '10': In Stock
    '20': Delivered
    '30': Reserved
    '40': Frozen
  erp-inv/reservation-status:
    '10': Active
    '20': Partially Consumed
    '30': Fully Consumed
    '40': Cancelled
    '50': Expired
  erp-inv/picking-status:
    '10': Pending Pick
    '20': Picking
    '30': Picked
    '40': Cancelled
  erp-inv/take-type:
    '10': Full Count
    '20': Sample Count
    '30': Cycle Count
