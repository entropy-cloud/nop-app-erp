type: page
title: "库存概览"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=本月1日"
        clearable: true
      - type: input-date
        name: endDate
        label: "结束日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=今天"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,trendChart,warehouseChart,shortageCrud,slowMovingCrud,batchExpiryCrud"

  - type: service
    name: kpiService
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}startDate:String,${'$'}endDate:String){ ErpInvDashboard__getDashboardKpi(startDate:${'$'}startDate,endDate:${'$'}endDate) }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpInvDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>库存总值</div>"
              - type: tpl
                tpl: "<span class='h3 text-primary'>¥${totalValue | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期入库量</div>"
              - type: tpl
                tpl: "<span class='h3 text-success'>${incomingQty | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期出库量</div>"
              - type: tpl
                tpl: "<span class='h3 text-danger'>${outgoingQty | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>库存周转率</div>"
              - type: tpl
                tpl: "<span class='h3 font-bold'>${turnoverRate | round:4}</span>"

  - type: chart
    name: trendChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}months:Int){ ErpInvDashboard__getDashboardTrend(months:${'$'}months) }"
        variables:
          months: 12
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpInvDashboard__getDashboardTrend || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '库存价值月度变动（近12月）' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['净变动成本'] },
            xAxis: { type: 'category', data: rows.map(function(r){return r.month;}) },
            yAxis: { type: 'value' },
            series: [
              { name: '净变动成本', type: 'bar', data: rows.map(function(r){return r.netValueChange;}) }
            ]
          }
        };

  - type: chart
    name: warehouseChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpInvDashboard__findWarehouseDistribution }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpInvDashboard__findWarehouseDistribution || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '仓库库存价值分布' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'right' },
            series: [
              {
                name: '库存价值',
                type: 'pie',
                radius: '60%',
                data: rows.map(function(r){return {name: '仓库#' + r.warehouseId, value: r.totalValue};})
              }
            ]
          }
        };

  - type: crud
    name: shortageCrud
    className: m-3
    title: "缺料预警（availableQty < material.safetyStock）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpInvDashboard__findShortageAlert }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpInvDashboard__findShortageAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: materialId
        label: "物料ID"
      - name: warehouseId
        label: "仓库ID"
      - name: availableQuantity
        label: "可用量"
      - name: safetyStock
        label: "安全库存"

  - type: crud
    name: slowMovingCrud
    className: m-3
    title: "滞销库存预警（阈值经 erp-dash.inv-slow-moving-days 配置）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpInvDashboard__findSlowMovingAlert }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpInvDashboard__findSlowMovingAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: materialId
        label: "物料ID"
      - name: warehouseId
        label: "仓库ID"
      - name: totalQuantity
        label: "库存量"
      - name: lastOutDate
        label: "最后出库日"

  - type: crud
    name: batchExpiryCrud
    className: m-3
    title: "批次效期预警（阈值经 erp-dash.inv-batch-expiry-days 配置）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "{ ErpInvDashboard__findBatchExpiryAlert }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpInvDashboard__findBatchExpiryAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: batchNo
        label: "批次号"
      - name: materialId
        label: "物料ID"
      - name: warehouseId
        label: "仓库ID"
      - name: expiryDate
        label: "到期日"
      - name: remainingDays
        label: "剩余天数"
      - name: availableQuantity
        label: "可用量"
