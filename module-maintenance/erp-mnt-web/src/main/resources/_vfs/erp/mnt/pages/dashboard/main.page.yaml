type: page
title: "维护概览"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=本月1日"
        clearable: true
      - type: input-date
        name: endDate
        label: "结束日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=今天"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,statusChart,downtimeCrud,overdueCrud"

  - type: service
    name: kpiService
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "query($startDate:String,$endDate:String){ ErpMntDashboard__getDashboardKpi(startDate:$startDate,endDate:$endDate){ equipmentTotal runningCount openRequestCount periodVisitCount } }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpMntDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>设备总数</div>"
              - type: tpl
                tpl: "<span class='h3 font-bold'>${equipmentTotal}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>运行中设备</div>"
              - type: tpl
                tpl: "<span class='h3 text-success'>${runningCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>待处理维护请求</div>"
              - type: tpl
                tpl: "<span class='h3 text-warning'>${openRequestCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期维护访问数</div>"
              - type: tpl
                tpl: "<span class='h3 text-primary'>${periodVisitCount}</span>"

  - type: chart
    name: statusChart
    className: m-3
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpMntDashboard__getEquipmentStatusDistribution { status count } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpMntDashboard__getEquipmentStatusDistribution || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '设备状态分布' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'right' },
            series: [
              {
                name: '设备数',
                type: 'pie',
                radius: ['40%', '70%'],
                data: rows.map(function(r){return {name: r.status, value: r.count};})
              }
            ]
          }
        };

  - type: crud
    name: downtimeCrud
    className: m-3
    title: "设备停机预警（状态=DOWN 且停机未恢复）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpMntDashboard__findEquipmentDowntimeAlert { equipmentId equipmentCode equipmentName status } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpMntDashboard__findEquipmentDowntimeAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: equipmentCode
        label: "设备编码"
      - name: equipmentName
        label: "设备名称"
      - name: status
        label: "状态"

  - type: crud
    name: overdueCrud
    className: m-3
    title: "维护逾期预警（阈值经 erp-dash.mnt-maintenance-overdue-days 配置）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpMntDashboard__findMaintenanceOverdueAlert { scheduleId scheduleCode scheduleName equipmentId nextDueDate overdueDays } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpMntDashboard__findMaintenanceOverdueAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: scheduleCode
        label: "计划编码"
      - name: scheduleName
        label: "计划名称"
      - name: equipmentId
        label: "设备ID"
      - name: nextDueDate
        label: "下次到期日"
      - name: overdueDays
        label: "逾期(天)"
