type: page
title: "维护历史表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: equipmentId
        label: "设备ID"
        placeholder: "留空查询全部设备"
      - type: input-date
        name: startDate
        label: "开始日期"
      - type: input-date
        name: endDate
        label: "结束日期"
      - type: button
        label: "渲染报表"
        actionType: ajax
        api:
          url: /api/GenericApi
          method: post
          dataType: raw
          data:
            query: "query($reportName:String!,$equipmentId:BigDecimal,$startDate:String,$endDate:String){ ErpMntReport__renderHtml(reportName:$reportName,data:{equipmentId:$equipmentId,startDate:$startDate,endDate:$endDate}) }"
            variables: { reportName: "maintenance-history", equipmentId: "${equipmentId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$equipmentId:BigDecimal,$startDate:String,$endDate:String){ ErpMntReport__download(reportName:$reportName,renderType:$renderType,data:{equipmentId:$equipmentId,startDate:$startDate,endDate:$endDate}){ fileName } }"
                variables: { reportName: "maintenance-history", renderType: "xlsx", equipmentId: "${equipmentId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$equipmentId:BigDecimal,$startDate:String,$endDate:String){ ErpMntReport__download(reportName:$reportName,renderType:$renderType,data:{equipmentId:$equipmentId,startDate:$startDate,endDate:$endDate}){ fileName } }"
                variables: { reportName: "maintenance-history", renderType: "pdf", equipmentId: "${equipmentId}", startDate: "${startDate}", endDate: "${endDate}" }
  - type: html
    id: reportContainer
    html: ""
    className: m-3
