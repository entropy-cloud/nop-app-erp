type: page
title: "停机统计表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: equipmentId
        label: "设备ID"
        placeholder: "留空查询全部设备"
      - type: input-date
        name: startDate
        label: "开始日期"
      - type: input-date
        name: endDate
        label: "结束日期"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}equipmentId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMntReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{equipmentId:${'$'}equipmentId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
                variables: { reportName: "downtime-summary", renderType: "xlsx", equipmentId: "${equipmentId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}equipmentId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMntReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{equipmentId:${'$'}equipmentId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
                variables: { reportName: "downtime-summary", renderType: "pdf", equipmentId: "${equipmentId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}equipmentId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMntReport__renderHtml(reportName:${'$'}reportName,data:{equipmentId:${'$'}equipmentId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
            variables:
              reportName: "downtime-summary"
              equipmentId: "${equipmentId}"
              startDate: "${startDate}"
              endDate: "${endDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpMntReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
