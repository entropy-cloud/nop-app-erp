dict.option.label:
  erp-mfg/work-order-status:
    '10': Draft
    '20': Submitted
    '30': Not Started
    '40': In Production
    '50': Kitted
    '60': Partially Kitted
    '70': Completed
    '80': Stopped
    '90': Closed
    '100': Cancelled
  erp-mfg/job-card-status:
    '10': Pending Start
    '20': Working
    '30': Partially Transferred
    '40': Transferred
    '50': Suspended
    '60': Submitted
    '70': Completed
    '80': Cancelled
  erp-mfg/bom-type:
    '10': Manufactured
    '20': Phantom/Kit
  erp-mfg/consumption:
    '10': Allow Overconsumption
    '20': Overconsumption Warning
    '30': Strict BOM
  erp-mfg/approve-status:
    '10': Unsubmitted
    '20': Submitted
    '30': Approved
    '40': Rejected
  erp-mfg/priority:
    '10': Low
    '20': General
    '30': High
    '40': Urgent
  erp-mfg/mrp-status:
    '10': Draft
    '20': Computing
    '30': Computed
    '40': Confirmed (To W/O)
    '50': Cancelled
  erp-mfg/mrp-order-type:
    '10': Planned Order
    '20': Purchase Req Suggestion
    '30': Work Order Suggestion
    '40': Outsource Suggestion
  erp-mfg/mrp-demand-source:
    '10': Sales Order
    '20': Forecast
    '30': Safety Stock
    '40': Manual Entry
  erp-mfg/issue-status:
    '10': Draft
    '20': Confirmed
    '30': Delivered
    '40': Cancelled
  erp-mfg/subcontract-status:
    '10': Draft
    '20': Effective
    '30': Voided
  erp-mfg/cost-rollup-status:
    '10': Draft
    '20': Calculated
    '30': Published
    '40': Voided
  erp-mfg/byproduct-type:
    '10': Co-product
    '20': Byproduct
