type: page
title: "生产差异报表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: workOrderId
        label: "工单ID"
        placeholder: "留空查询全部工单"
      - type: input-date
        name: startDate
        label: "开始日期"
        valueFormat: "YYYY-MM-DD"
      - type: input-date
        name: endDate
        label: "结束日期"
        valueFormat: "YYYY-MM-DD"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpMfgReport__download
              method: post
              responseType: blob
              data:
                reportName: "production-variance-report"
                renderType: "xlsx"
                data: { workOrderId: "${workOrderId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpMfgReport__download
              method: post
              responseType: blob
              data:
                reportName: "production-variance-report"
                renderType: "pdf"
                data: { workOrderId: "${workOrderId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}workOrderId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMfgReport__renderHtml(reportName:${'$'}reportName,data:{workOrderId:${'$'}workOrderId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
            variables:
              reportName: "production-variance-report"
              workOrderId: "${workOrderId}"
              startDate: "${startDate}"
              endDate: "${endDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpMfgReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
