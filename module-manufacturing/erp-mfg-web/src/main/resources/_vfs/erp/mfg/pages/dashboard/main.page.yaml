type: page
title: "制造概览"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=本月1日"
        clearable: true
      - type: input-date
        name: endDate
        label: "结束日期"
        format: "YYYY-MM-DD"
        placeholder: "留空=今天"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,statusChart,trendChart,delayedWorkOrderCrud"

  - type: service
    name: kpiService
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "query($startDate:String,$endDate:String){ ErpMfgDashboard__getDashboardKpi(startDate:$startDate,endDate:$endDate){ inProcessCount periodCompletedQty stockPartialCount onTimeRate } }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpMfgDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>在制工单数</div>"
              - type: tpl
                tpl: "<span class='h3 font-bold'>${inProcessCount}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>本期完工量</div>"
              - type: tpl
                tpl: "<span class='h3 text-success'>${periodCompletedQty | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>工单准时率</div>"
              - type: tpl
                tpl: "<span class='h3 text-primary'>${onTimeRate | round:2}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>齐套待产</div>"
              - type: tpl
                tpl: "<span class='h3 text-warning'>${stockPartialCount}</span>"

  - type: chart
    name: statusChart
    className: m-3
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpMfgDashboard__getWorkOrderStatusDistribution { status count } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpMfgDashboard__getWorkOrderStatusDistribution || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '工单状态分布' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'right' },
            series: [
              {
                name: '工单数',
                type: 'pie',
                radius: ['40%', '70%'],
                data: rows.map(function(r){return {name: r.status, value: r.count};})
              }
            ]
          }
        };

  - type: chart
    name: trendChart
    className: m-3
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "query($months:Int){ ErpMfgDashboard__getDashboardTrend(months:$months){ month completedQty } }"
        variables:
          months: 12
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpMfgDashboard__getDashboardTrend || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '产成品产出趋势（近12月）' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['完工量'] },
            xAxis: { type: 'category', data: rows.map(function(r){return r.month;}) },
            yAxis: { type: 'value' },
            series: [
              { name: '完工量', type: 'line', data: rows.map(function(r){return r.completedQty;}) }
            ]
          }
        };

  - type: crud
    name: delayedWorkOrderCrud
    className: m-3
    title: "工单延期预警（计划完成日 < 今天 且 未完工）"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /api/GenericApi
      method: post
      dataType: raw
      data:
        query: "{ ErpMfgDashboard__findDelayedWorkOrderAlert { workOrderId workOrderCode plannedEndDate docStatus overdueDays } }"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpMfgDashboard__findDelayedWorkOrderAlert || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: workOrderCode
        label: "工单编码"
      - name: plannedEndDate
        label: "计划完成日"
      - name: docStatus
        label: "状态"
      - name: overdueDays
        label: "逾期(天)"
