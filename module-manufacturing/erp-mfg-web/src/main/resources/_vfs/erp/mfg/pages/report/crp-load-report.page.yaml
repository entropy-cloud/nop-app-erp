type: page
title: "CRP 负荷报表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: workcenterId
        label: "工作中心ID"
        placeholder: "留空查询全部工作中心"
      - type: input-date
        name: startDate
        label: "开始日期"
      - type: input-date
        name: endDate
        label: "结束日期"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}workcenterId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMfgReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{workcenterId:${'$'}workcenterId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
                variables: { reportName: "crp-load-report", renderType: "xlsx", workcenterId: "${workcenterId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!,${'$'}workcenterId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMfgReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{workcenterId:${'$'}workcenterId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
                variables: { reportName: "crp-load-report", renderType: "pdf", workcenterId: "${workcenterId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}workcenterId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpMfgReport__renderHtml(reportName:${'$'}reportName,data:{workcenterId:${'$'}workcenterId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
            variables:
              reportName: "crp-load-report"
              workcenterId: "${workcenterId}"
              startDate: "${startDate}"
              endDate: "${endDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpMfgReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
