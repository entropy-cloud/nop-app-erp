# HR 组织架构图（F16 P2 复杂页面，plan 2026-07-22-1400-2 §Phase 1，Phase 0 Explore (b) 降级候选 (b)）。
# 经 Phase 0 Explore (b) + 实现期裁决：AMIS type:tree 渲染器在 Nop bundle 中不存在（RuntimeError: 找不到对应的渲染器），
# 降级为 each+tpl 嵌套缩进列表（部门层级 + 员工数 + 负责人），复用 F13 custom JSON 组装范式。
# ErpHrDepartment__findPage（扁平 + parentId）→ adaptor parentId-map 重建嵌套 +
# ErpHrEmployee__findPage 按 departmentId 聚合员工计数。
# 字段名经实时仓库核实：ErpHrDepartment.name/managerId/parentId/code；ErpHrEmployee.fullName/code/departmentId。
type: page
title: "组织架构图"
remark: "部门层级列表（ErpHrDepartment parent→children 重建嵌套），每节点含员工数（ErpHrEmployee 按 departmentId 聚合）+ 负责人(managerId)。AMIS type:tree 渲染器不可用，降级 each+tpl 缩进列表。"
body:
  - type: form
    name: filterForm
    title: "搜索"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-text
        name: keyword
        label: "部门关键字"
        placeholder: "输入部门名称/编码过滤"
        clearable: true
      - type: button
        label: "重建架构图"
        icon: "refresh-cw"
        actionType: reload
        target: "orgTreeService"

  - type: service
    name: orgTreeService
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}lim:Int){ deptPage: ErpHrDepartment__findPage(query:{limit:${'$'}lim}){ items{ id parentId name code managerId } total } empPage: ErpHrEmployee__findPage(query:{limit:${'$'}lim}){ items{ id departmentId fullName code positionId } total } }"
        variables:
          lim: 5000
      adaptor: |
        try {
          const d = payload.data || {};
          const gql = d.data ? d.data : d;
          const depts = (gql.deptPage && gql.deptPage.items) ? gql.deptPage.items : [];
          const emps = (gql.empPage && gql.empPage.items) ? gql.empPage.items : [];

          const empByDept = {};
          emps.forEach(function(e){
            const did = e.departmentId;
            if (did == null) return;
            if (!empByDept[did]) empByDept[did] = { count: 0, names: [] };
            empByDept[did].count += 1;
            if (empByDept[did].names.length < 5) {
              empByDept[did].names.push(e.fullName ? e.fullName : ('emp#' + e.id));
            }
          });

          const nodeMap = {};
          depts.forEach(function(dp){
            const ec = empByDept[dp.id] || { count: 0, names: [] };
            nodeMap[dp.id] = {
              id: dp.id,
              name: dp.name,
              code: dp.code,
              managerId: dp.managerId,
              parentId: dp.parentId,
              empCount: ec.count,
              empNames: ec.names,
              children: []
            };
          });

          const roots = [];
          depts.forEach(function(dp){
            const node = nodeMap[dp.id];
            const pid = dp.parentId;
            if (pid != null && pid !== 0 && nodeMap[pid]) {
              nodeMap[pid].children.push(node);
            } else {
              roots.push(node);
            }
          });

          // Flatten to display rows with indentation level
          const flatRows = [];
          function flatten(nodes, level){
            nodes.forEach(function(n){
              flatRows.push({
                id: n.id,
                name: n.name,
                code: n.code,
                managerId: n.managerId,
                empCount: n.empCount,
                empNames: n.empNames.join(', '),
                level: level,
                indent: new Array(level + 1).join('　'),
                hasChildren: n.children && n.children.length > 0,
                childCount: n.children ? n.children.length : 0
              });
              if (n.children && n.children.length > 0) {
                flatten(n.children, level + 1);
              }
            });
          }
          flatten(roots, 0);

          return {
            status: 0,
            msg: '',
            data: {
              flatRows: flatRows,
              totalDept: depts.length,
              totalEmp: emps.length,
              hasData: flatRows.length > 0
            }
          };
        } catch(e) {
          return { status: 0, msg: '', data: { flatRows: [], totalDept: 0, totalEmp: 0, hasData: false, error: String(e) } };
        }
    body:
      - type: tpl
        visibleOn: "${hasData}"
        tpl: '<div class="text-muted m-b-sm">部门数：${totalDept} · 员工总数：${totalEmp}（缩进展示层级，含员工数与负责人）</div>'
      - type: tpl
        visibleOn: "${!hasData}"
        tpl: '<div class="text-muted p-3">未找到匹配的部门。请清空关键字后刷新，或确认部门主数据已录入。</div>'
      - type: table
        visibleOn: "${hasData}"
        source: "${flatRows}"
        columns:
          - name: name
            label: "部门名称"
            type: tpl
            tpl: '${indent}${hasChildren ? "▸ " : "• "}${name}'
          - { name: code, label: "编码" }
          - { name: empCount, label: "员工数" }
          - name: managerId
            label: "负责人"
            type: tpl
            tpl: '${managerId ? "Mgr#" + managerId : "—"}'
          - name: empNames
            label: "成员"
            type: tpl
            tpl: '<span class="text-muted">${empNames || "—"}</span>'

