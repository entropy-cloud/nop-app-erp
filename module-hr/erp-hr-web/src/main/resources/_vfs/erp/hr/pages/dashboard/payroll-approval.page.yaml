# HR 薪酬核算审批（F16 P2 复杂页面，plan 2026-07-22-1400-2 §Phase 1）。
# 前端组装既有数据：ErpHrSalary__findList 按年月过滤 → adaptor 聚合汇总卡片
# （人数/应发 grossSalary/社保 socialInsurance/个税 taxAmount/实发 netSalary）
# + 明细 crud（含 markPaid/voidSalary row-action，平台 DIRECT 审批轴）。
# 字段名经实时仓库核实：grossSalary/netSalary/taxAmount（非 grossAmount/netAmount/individualTax），
# year+month 双字段（非 payPeriod），paymentStatus（erp-hr/salary-payment-status）+ approveStatus（wf/approve-status）。
# 实体无 departmentId 字段，分组维度改用 orgId（业务组织）。
# Excel 导出 = Non-Goal（平台导出归 successor）；敏感字段脱敏 = Non-Goal（归 Plan 3）。
type: page
title: "薪酬核算审批"
remark: "按年月过滤薪酬记录（ErpHrSalary），前端聚合汇总卡片（人数/应发/社保/个税/实发 + 按组织分组），明细支持标记已发放(markPaid)/作废(voidSalary)。实体无 departmentId，分组维度用 orgId（业务组织）。"
body:
  - type: form
    name: filterForm
    title: "薪酬期间筛选"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-number
        name: year
        label: "年份"
        placeholder: "如 2026"
        value: 2026
        required: true
        clearable: true
      - type: select
        name: month
        label: "月份"
        value: 1
        options:
          - { label: "1月", value: 1 }
          - { label: "2月", value: 2 }
          - { label: "3月", value: 3 }
          - { label: "4月", value: 4 }
          - { label: "5月", value: 5 }
          - { label: "6月", value: 6 }
          - { label: "7月", value: 7 }
          - { label: "8月", value: 8 }
          - { label: "9月", value: 9 }
          - { label: "10月", value: 10 }
          - { label: "11月", value: 11 }
          - { label: "12月", value: 12 }
        clearable: true
      - type: button
        label: "刷新汇总与明细"
        icon: "refresh-cw"
        actionType: reload
        target: "payrollSummary,salaryCrud"

  # 汇总卡片：前端 group-by 聚合（人数/应发/社保/个税/实发 + 按组织分组明细）
  - type: service
    name: payrollSummary
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}lim:Int){ ErpHrSalary__findPage(query:{limit:${'$'}lim}){ items{ id year month orgId grossSalary netSalary taxAmount socialInsurance basicSalary paymentStatus approveStatus employeeId } total } }"
        variables:
          lim: 2000
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const page = gql.ErpHrSalary__findPage || { items: [], total: 0 };
        let rows = page.items || [];
        // Client-side filter by year/month (entity XMeta doesn't expose filter_ shorthand)
        const fy = typeof year !== 'undefined' ? year : null;
        const fm = typeof month !== 'undefined' ? month : null;
        if (fy != null) rows = rows.filter(function(r){ return r.year == fy; });
        if (fm != null) rows = rows.filter(function(r){ return r.month == fm; });
        const count = rows.length;
        const sum = function(arr, f){ return arr.reduce(function(s,r){ var v = r[f]; return s + (typeof v === 'number' ? v : (parseFloat(v)||0)); }, 0); };
        const round2 = function(n){ return Math.round(n*100)/100; };
        const totalGross = round2(sum(rows,'grossSalary'));
        const totalSocial = round2(sum(rows,'socialInsurance'));
        const totalTax = round2(sum(rows,'taxAmount'));
        const totalNet = round2(sum(rows,'netSalary'));

        // 按组织(orgId)分组聚合
        const orgMap = {};
        rows.forEach(function(r){
          const key = r.orgId != null ? r.orgId : 0;
          if (!orgMap[key]) orgMap[key] = { orgId: key, count: 0, gross: 0, social: 0, tax: 0, net: 0 };
          orgMap[key].count += 1;
          orgMap[key].gross += (typeof r.grossSalary === 'number' ? r.grossSalary : (parseFloat(r.grossSalary)||0));
          orgMap[key].social += (typeof r.socialInsurance === 'number' ? r.socialInsurance : (parseFloat(r.socialInsurance)||0));
          orgMap[key].tax += (typeof r.taxAmount === 'number' ? r.taxAmount : (parseFloat(r.taxAmount)||0));
          orgMap[key].net += (typeof r.netSalary === 'number' ? r.netSalary : (parseFloat(r.netSalary)||0));
        });
        const orgGroups = Object.keys(orgMap).map(function(k){
          var g = orgMap[k];
          return { orgId: g.orgId, count: g.count, gross: round2(g.gross), social: round2(g.social), tax: round2(g.tax), net: round2(g.net) };
        });

        return {
          status: 0,
          msg: '',
          data: {
            count: count,
            totalGross: totalGross,
            totalSocial: totalSocial,
            totalTax: totalTax,
            totalNet: totalNet,
            orgGroups: orgGroups,
            hasData: count > 0
          }
        };
    body:
      - type: grid
        className: m-b
        columns:
          - type: tpl
            tpl: '<div class="panel panel-default"><div class="panel-body text-center"><div class="text-muted">人数</div><h3 class="m-t-sm">${count}</h3></div></div>'
          - type: tpl
            tpl: '<div class="panel panel-default"><div class="panel-body text-center"><div class="text-muted">应发合计</div><h3 class="m-t-sm text-primary">${totalGross}</h3></div></div>'
          - type: tpl
            tpl: '<div class="panel panel-default"><div class="panel-body text-center"><div class="text-muted">社保合计</div><h3 class="m-t-sm text-warning">${totalSocial}</h3></div></div>'
          - type: tpl
            tpl: '<div class="panel panel-default"><div class="panel-body text-center"><div class="text-muted">个税合计</div><h3 class="m-t-sm text-danger">${totalTax}</h3></div></div>'
          - type: tpl
            tpl: '<div class="panel panel-default"><div class="panel-body text-center"><div class="text-muted">实发合计</div><h3 class="m-t-sm text-success">${totalNet}</h3></div></div>'
      - type: tpl
        visibleOn: "${hasData}"
        tpl: '<div class="text-muted m-b-sm">按组织（orgId）分组聚合：</div>'
      - type: table
        visibleOn: "${hasData}"
        source: "${orgGroups}"
        columns:
          - { name: orgId, label: "组织ID" }
          - { name: count, label: "人数" }
          - { name: gross, label: "应发", type: number, precision: 2 }
          - { name: social, label: "社保", type: number, precision: 2 }
          - { name: tax, label: "个税", type: number, precision: 2 }
          - { name: net, label: "实发", type: number, precision: 2 }

  # 明细 crud：ErpHrSalary 列表 + markPaid/voidSalary row-action
  - type: crud
    name: salaryCrud
    className: m-3
    title: "薪酬明细（按年月过滤）"
    headerToolbar: []
    footerToolbar: ["statistics"]
    syncLocation: false
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}lim:Int){ ErpHrSalary__findPage(query:{limit:${'$'}lim}){ items{ id year month orgId employeeId grossSalary netSalary taxAmount socialInsurance basicSalary paymentStatus approveStatus } total } }"
        variables:
          lim: 2000
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const page = gql.ErpHrSalary__findPage || { items: [], total: 0 };
        let rows = page.items || [];
        const fy = typeof year !== 'undefined' ? year : null;
        const fm = typeof month !== 'undefined' ? month : null;
        if (fy != null) rows = rows.filter(function(r){ return r.year == fy; });
        if (fm != null) rows = rows.filter(function(r){ return r.month == fm; });
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - { name: id, label: "ID" }
      - { name: employeeId, label: "员工ID" }
      - { name: orgId, label: "组织" }
      - { name: grossSalary, label: "应发", type: number, precision: 2 }
      - { name: socialInsurance, label: "社保", type: number, precision: 2 }
      - { name: taxAmount, label: "个税", type: number, precision: 2 }
      - { name: netSalary, label: "实发", type: number, precision: 2 }
      - name: paymentStatus
        label: "支付状态"
        type: tpl
        tpl: '<span class="label label-${paymentStatus == "PAID" ? "success" : (paymentStatus == "VOID" ? "default" : "warning")}">${paymentStatus}</span>'
      - name: approveStatus
        label: "审批状态"
        type: tpl
        tpl: '<span class="label label-${approveStatus == "APPROVED" ? "success" : (approveStatus == "REJECTED" ? "danger" : "info")}">${approveStatus}</span>'
      - type: operation
        label: "操作"
        buttons:
          - type: button
            label: "标记已发放"
            level: success
            visibleOn: '${paymentStatus == "PENDING"}'
            confirmText: "确认标记此薪酬记录为已发放？"
            api:
              method: post
              url: /graphql
              dataType: raw
              data:
                query: "mutation(${'$'}sid:Long){ ErpHrSalary__markPaid(salaryId:${'$'}sid){ id paymentStatus } }"
                variables:
                  sid: "${id}"
          - type: button
            label: "作废"
            level: danger
            visibleOn: '${paymentStatus != "VOID"}'
            confirmText: "确认作废此薪酬记录？此操作不可逆。"
            api:
              method: post
              url: /graphql
              dataType: raw
              data:
                query: "mutation(${'$'}sid:Long){ ErpHrSalary__voidSalary(salaryId:${'$'}sid){ id paymentStatus } }"
                variables:
                  sid: "${id}"
