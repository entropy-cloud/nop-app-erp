type: page
title: "员工净余额报表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!){ ErpHrReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{}) }"
                variables: { reportName: "employee-net-balance", renderType: "xlsx" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query(${'$'}reportName:String!,${'$'}renderType:String!){ ErpHrReport__download(reportName:${'$'}reportName,renderType:${'$'}renderType,data:{}) }"
                variables: { reportName: "employee-net-balance", renderType: "pdf" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!){ ErpHrReport__renderHtml(reportName:${'$'}reportName,data:{}) }"
            variables:
              reportName: "employee-net-balance"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpHrReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
