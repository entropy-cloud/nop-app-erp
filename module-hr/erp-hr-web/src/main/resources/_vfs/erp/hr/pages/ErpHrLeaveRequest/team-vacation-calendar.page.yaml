# HR 团队休假日历（F13 非标准视图，plan 2026-07-22-0845-3 §Phase 3）。
# 经 Phase 0 Explore (b) 裁决：原生 `type: calendar` 不支持「行=员工，列=日期」矩阵范式 →
# 改用 custom `type: table`（行=员工，列=日期，单元格 tpl 渲染 leaveType 色块）。
# 数据源 ErpHrLeaveRequest__findPage 按 startDate 区间筛选 + status=APPROVED（仅已批准），
# 经 employeeId 分组映射到日期格。
# leaveType 颜色编码（erp-hr/leave-type 字典）：ANNUAL=蓝 / SICK=黄 / PERSONAL=橙 / 其他=灰。
# 同日多员工同类型休假 → 单元格多色块叠加（冲突检测可视化）。
# 注：实体名 ErpHrLeaveRequest（非 ErpHrLeave，见 plan §Current Baseline row #7）。
type: page
title: "团队休假日历"
remark: "团队成员休假（ErpHrLeaveRequest status=APPROVED）按月矩阵展示：行=员工，列=日期。休假类型颜色编码块：年假=蓝/病假=黄/事假=橙/婚假=粉/产假=紫/丧假=灰/调休=青。同日多员工休假自然可视化（冲突检测）。"
body:
  - type: form
    name: filterForm
    title: "月份选择"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-month
        name: month
        label: "月份"
        placeholder: "选择月份"
        inputFormat: "YYYY-MM"
        format: "YYYY-MM"
      - type: button
        label: "刷新矩阵"
        icon: "refresh-cw"
        actionType: reload
        target: "vacationMatrix"

  - type: service
    name: vacationMatrix
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}lim:Int){ ErpHrLeaveRequest__findPage(filter_status:\"APPROVED\",limit:${'$'}lim,orderBy:\"startDate ASC\"){ items{ id employeeId leaveType startDate endDate reason employee{ employeeCode employeeName } } total } }"
        variables:
          lim: 500
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const page = gql.ErpHrLeaveRequest__findPage || { items: [], total: 0 };
        const rows = page.items || [];

        // 解析选中月份（默认当月）
        const inputMonth = (typeof month !== 'undefined' && month) ? String(month) : null;
        const ym = inputMonth ? inputMonth.substring(0, 7) : (new Date().toISOString().substring(0, 7));
        const [yy, mm] = ym.split('-').map(function(n){ return parseInt(n, 10); });
        const firstDay = new Date(yy, mm - 1, 1);
        const lastDay = new Date(yy, mm, 0);
        const dayCount = lastDay.getDate();
        const days = [];
        for (let i = 1; i <= dayCount; i++) {
          const dd = i < 10 ? '0' + i : '' + i;
          days.push(ym + '-' + dd);
        }

        // 员工列表 + index map（行=员工，去重）
        const employees = [];
        const empIdx = {};
        rows.forEach(function(r){
          const eid = r.employeeId;
          if (empIdx[eid] === undefined) {
            empIdx[eid] = employees.length;
            employees.push({
              employeeId: eid,
              employeeName: r.employee && r.employee.employeeName ? r.employee.employeeName : ('员工#' + eid),
              employeeCode: r.employee && r.employee.employeeCode ? r.employee.employeeCode : ''
            });
          }
        });
        if (employees.length === 0) {
          employees.push({ employeeId: 0, employeeName: '（无休假记录）', employeeCode: '' });
        }

        // leaveType 颜色 + 标签
        const typeColor = {
          ANNUAL: '#3b82f6',
          SICK: '#f59e0b',
          PERSONAL: '#f97316',
          MARRIAGE: '#ec4899',
          MATERNITY: '#8b5cf6',
          FUNERAL: '#6b7280',
          COMPENSATORY: '#06b6d4'
        };
        const typeLabel = {
          ANNUAL: '年',
          SICK: '病',
          PERSONAL: '事',
          MARRIAGE: '婚',
          MATERNITY: '产',
          FUNERAL: '丧',
          COMPENSATORY: '调'
        };

        // 构建 cell 矩阵 [empIdx][dayIdx] = [{type, label}]
        const matrix = {};
        rows.forEach(function(r){
          const startStr = r.startDate ? String(r.startDate).substring(0, 10) : null;
          const endStr = r.endDate ? String(r.endDate).substring(0, 10) : startStr;
          if (!startStr || !endStr) return;
          // 仅处理与本月经期重叠的部分
          if (endStr < days[0] || startStr > days[days.length - 1]) return;
          const ei = empIdx[r.employeeId];
          if (ei === undefined) return;
          days.forEach(function(day){
            if (day >= startStr && day <= endStr) {
              if (!matrix[ei]) matrix[ei] = {};
              if (!matrix[ei][day]) matrix[ei][day] = [];
              matrix[ei][day].push({
                type: r.leaveType,
                label: typeLabel[r.leaveType] || r.leaveType.charAt(0),
                color: typeColor[r.leaveType] || '#9ca3af'
              });
            }
          });
        });

        // 渲染 table：表头=日期 + 表体=员工行
        const headerRow = [{ name: 'employee', label: '员工', fixed: 'left' }].concat(
          days.map(function(day){
            const dow = new Date(day + 'T00:00:00').getDay();
            const isWeekend = (dow === 0 || dow === 6);
            return {
              name: 'd_' + day,
              label: parseInt(day.substring(8, 10), 10),
              title: day,
              className: isWeekend ? 'bg-light text-muted' : ''
            };
          })
        );

        // 构造 AMIS table 可消费的 columns + data
        const columns = [{
          name: 'employeeName',
          label: '员工',
          fixed: 'left',
          width: 120
        }].concat(days.map(function(day){
          const dow = new Date(day + 'T00:00:00').getDay();
          const isWeekend = (dow === 0 || dow === 6);
          return {
            name: 'd_' + day,
            label: parseInt(day.substring(8, 10), 10).toString(),
            type: 'tpl',
            className: isWeekend ? 'bg-light' : '',
            tpl: '${' + day + ' | leave:' + day + ' | raw}'
          };
        }));

        // 用 data 字段返回员工行
        const dataRows = employees.map(function(emp, ei){
          const row = { employeeId: emp.employeeId, employeeName: emp.employeeName + (emp.employeeCode ? ' (' + emp.employeeCode + ')' : '') };
          days.forEach(function(day){
            const cells = matrix[ei] && matrix[ei][day] ? matrix[ei][day] : [];
            if (cells.length === 0) {
              row['d_' + day] = '';
            } else {
              // 多个 cell 用 span 堆叠
              const spans = cells.map(function(c){
                return '<span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;border-radius:3px;margin:1px;background:' + c.color + '" title="' + c.type + '">' + c.label + '</span>';
              }).join('');
              row['d_' + day] = spans;
            }
          });
          return row;
        });

        return {
          status: 0,
          msg: '',
          data: {
            rows: dataRows,
            columns: columns,
            monthLabel: ym,
            totalEmployees: employees.length,
            totalRequests: rows.length
          }
        };
    body:
      - type: tpl
        tpl: '<div class="m-b"><strong>${monthLabel}</strong> · 员工数: ${totalEmployees} · 休假申请: ${totalRequests}</div>'
      - type: tpl
        tpl: '<div class="m-b"><span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;background:#3b82f6;border-radius:3px;margin-right:2px;">年</span>年假 &nbsp; <span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;background:#f59e0b;border-radius:3px;margin-right:2px;">病</span>病假 &nbsp; <span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;background:#f97316;border-radius:3px;margin-right:2px;">事</span>事假 &nbsp; <span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;background:#ec4899;border-radius:3px;margin-right:2px;">婚</span>婚假 &nbsp; <span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;background:#8b5cf6;border-radius:3px;margin-right:2px;">产</span>产假 &nbsp; <span style="display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;color:#fff;background:#06b6d4;border-radius:3px;margin-right:2px;">调</span>调休</div>'
      - type: table
        name: matrixTable
        source: "${rows}"
        columns: "${columns}"
        placeholder: "本月份无批准的休假申请"
