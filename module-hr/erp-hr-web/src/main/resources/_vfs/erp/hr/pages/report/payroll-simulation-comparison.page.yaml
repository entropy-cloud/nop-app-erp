type: page
title: "薪酬模拟对比报表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: simulationId
        label: "薪酬模拟ID"
        placeholder: "输入模拟方案ID"
        value: 1
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpHrReport__download
              method: post
              responseType: blob
              data:
                reportName: "payroll-simulation-comparison"
                renderType: "xlsx"
                data: { simulationId: "${simulationId}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpHrReport__download
              method: post
              responseType: blob
              data:
                reportName: "payroll-simulation-comparison"
                renderType: "pdf"
                data: { simulationId: "${simulationId}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}simulationId:BigDecimal){ ErpHrReport__renderHtml(reportName:${'$'}reportName,data:{simulationId:${'$'}simulationId}) }"
            variables:
              reportName: "payroll-simulation-comparison"
              simulationId: "${simulationId}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpHrReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
