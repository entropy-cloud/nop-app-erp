type: page
title: "薪酬模拟对比报表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: simulationId
        label: "薪酬模拟ID"
        placeholder: "输入模拟方案ID"
        value: 1
      - type: button
        label: "渲染报表"
        actionType: ajax
        api:
          url: /api/GenericApi
          method: post
          dataType: raw
          data:
            query: "query($reportName:String!,$simulationId:BigDecimal){ ErpHrReport__renderHtml(reportName:$reportName,data:{simulationId:$simulationId}) }"
            variables: { reportName: "payroll-simulation-comparison", simulationId: "${simulationId}" }
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$simulationId:BigDecimal){ ErpHrReport__download(reportName:$reportName,renderType:$renderType,data:{simulationId:$simulationId}){ fileName } }"
                variables: { reportName: "payroll-simulation-comparison", renderType: "xlsx", simulationId: "${simulationId}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /api/GenericApi
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$simulationId:BigDecimal){ ErpHrReport__download(reportName:$reportName,renderType:$renderType,data:{simulationId:$simulationId}){ fileName } }"
                variables: { reportName: "payroll-simulation-comparison", renderType: "pdf", simulationId: "${simulationId}" }
  - type: html
    id: reportContainer
    html: ""
    className: m-3
