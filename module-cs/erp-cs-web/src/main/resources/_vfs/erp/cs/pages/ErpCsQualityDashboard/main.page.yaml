type: page
title: "客服绩效看板"
body:
  - type: form
    name: filterForm
    title: ""
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-date
        name: startDate
        label: "开始日期"
        format: "YYYY-MM-DD"
        clearable: true
      - type: input-date
        name: endDate
        label: "结束日期"
        format: "YYYY-MM-DD"
        clearable: true
      - type: button
        label: "刷新"
        icon: "refresh-cw"
        actionType: reload
        target: "kpiService,teamRankingChart,agentCsatCrud"

  - type: service
    name: kpiService
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}startDate:String,${'$'}endDate:String){ ErpCsQualityDashboard__getDashboardKpi(startDate:${'$'}startDate,endDate:${'$'}endDate) }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const kpi = gql.ErpCsQualityDashboard__getDashboardKpi || {};
        return { status: 0, msg: '', data: kpi };
    body:
      - type: grid
        className: m-3
        gap: 'sm'
        columns:
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>SLA 达标率</div>"
              - type: tpl
                tpl: "<span class='h3 text-success'>${slaCompletionRate != null ? (slaCompletionRate * 100).toFixed(1) + '%' : '-'}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>平均解决时长(小时)</div>"
              - type: tpl
                tpl: "<span class='h3'>${avgResolutionHours != null ? avgResolutionHours : '-'}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>超时工单数</div>"
              - type: tpl
                tpl: "<span class='h3 text-danger'>${slaBreachedCount != null ? slaBreachedCount : 0}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>已关闭工单数</div>"
              - type: tpl
                tpl: "<span class='h3'>${totalTickets != null ? totalTickets : 0}</span>"
          - type: wrapper
            className: "border rounded p-3"
            body:
              - type: tpl
                tpl: "<div class='text-muted'>平均首次响应时长(小时)</div>"
              - type: tpl
                tpl: "<span class='h3'>${avgFirstResponseHours != null ? avgFirstResponseHours : '-'}</span>"

  - type: chart
    name: teamRankingChart
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}startDate:String,${'$'}endDate:String){ ErpCsQualityDashboard__getTeamSlaRanking(startDate:${'$'}startDate,endDate:${'$'}endDate) }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpCsQualityDashboard__getTeamSlaRanking || [];
        return {
          status: 0,
          msg: '',
          data: {
            title: { text: '团队 SLA 达标率排名' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['SLA达标率', '工单数'] },
            xAxis: { type: 'category', data: rows.map(function(r){return r.teamName;}) },
            yAxis: [{ type: 'value', name: '达标率', max: 1 }, { type: 'value', name: '工单数' }],
            series: [
              { name: 'SLA达标率', type: 'bar', data: rows.map(function(r){return r.slaCompletionRate;}) },
              { name: '工单数', type: 'bar', yAxisIndex: 1, data: rows.map(function(r){return r.totalTickets;}) }
            ]
          }
        };

  - type: crud
    name: agentCsatCrud
    className: m-3
    title: "客服 CSAT/NPS/CES 明细"
    syncLocation: false
    headerToolbar: []
    footerToolbar: []
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}startDate:String,${'$'}endDate:String){ ErpCsQualityDashboard__getAgentCsatBreakdown(startDate:${'$'}startDate,endDate:${'$'}endDate) }"
        variables:
          startDate: "${startDate || null}"
          endDate: "${endDate || null}"
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const rows = gql.ErpCsQualityDashboard__getAgentCsatBreakdown || [];
        return { status: 0, msg: '', data: { items: rows, count: rows.length } };
    columns:
      - name: agentId
        label: "客服ID"
      - name: ticketCount
        label: "工单数"
      - name: surveyCount
        label: "调查回复数"
      - name: avgCsat
        label: "平均CSAT"
      - name: avgNps
        label: "平均NPS"
      - name: avgCes
        label: "平均CES"
