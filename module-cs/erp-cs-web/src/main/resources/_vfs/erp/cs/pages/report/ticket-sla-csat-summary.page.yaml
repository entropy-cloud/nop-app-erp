type: page
title: "工单 SLA/CSAT 综合统计表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-text
        name: ticketType
        label: "工单类型"
        placeholder: "按工单类型过滤（留空查全部）"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpCsReport__download
              method: post
              responseType: blob
              data:
                reportName: "ticket-sla-csat-summary"
                renderType: "xlsx"
                data: { ticketType: "${ticketType}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpCsReport__download
              method: post
              responseType: blob
              data:
                reportName: "ticket-sla-csat-summary"
                renderType: "pdf"
                data: { ticketType: "${ticketType}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}ticketType:String){ ErpCsReport__renderHtml(reportName:${'$'}reportName,data:{ticketType:${'$'}ticketType}) }"
            variables:
              reportName: "ticket-sla-csat-summary"
              ticketType: "${ticketType}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpCsReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
