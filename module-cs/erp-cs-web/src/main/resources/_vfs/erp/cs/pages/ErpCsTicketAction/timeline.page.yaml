# CS 工单操作日志时间线（F13 非标准视图，plan 2026-07-22-0845-3 §Phase 2）。
# 实现期裁决（同 crm activity-timeline）：原生 type:timeline prop 契约经 service scope 失败，
# 降级为 each + tpl 自定义纵向时间线（同 HR 矩阵的可靠范式）。
# 数据源 ErpCsTicketAction__findPage，按 createTime 倒序。
# from→to 状态变迁经 tpl 箭头渲染。
type: page
title: "工单操作日志时间线"
remark: "客服工单操作日志（ErpCsTicketAction）按操作时间倒序的纵向时间线。每条记录显示：操作人 / 操作时间 / fromStatus → toStatus 状态变迁（箭头渲染）/ 操作内容。支持按 ticketId 过滤特定工单的操作历史。"
body:
  - type: form
    name: filterForm
    title: "筛选"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-number
        name: ticketId
        label: "工单ID"
        placeholder: "过滤特定工单的操作历史"
        clearable: true
      - type: button
        label: "刷新时间线"
        icon: "refresh-cw"
        actionType: reload
        target: "actionTimeline"

  - type: service
    name: actionTimeline
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}tid:Long,${'$'}lim:Int){ ErpCsTicketAction__findPage(filter_ticketId:${'$'}tid,limit:${'$'}lim,orderBy:\"createTime DESC\"){ items{ id ticketId actionType fromStatus toStatus operatorId content createTime } total } }"
        variables:
          tid: "${ticketId || null}"
          lim: 100
      adaptor: |
        const d = payload.data || {};
        const gql = d.data ? d.data : d;
        const page = gql.ErpCsTicketAction__findPage || { items: [], total: 0 };
        const items = (page.items || []).map(function(a){
          const typeMeta = {
            ASSIGN: { color: '#3b82f6', label: '分派' },
            CLOSE: { color: '#10b981', label: '关闭' },
            CANCEL: { color: '#ef4444', label: '取消' },
            ESCALATE: { color: '#f59e0b', label: '升级' },
            NOTE: { color: '#6b7280', label: '备注' }
          }[a.actionType] || { color: '#6b7280', label: a.actionType };
          return {
            id: a.id,
            createTime: a.createTime,
            actionType: a.actionType,
            typeColor: typeMeta.color,
            typeLabel: typeMeta.label,
            fromStatus: a.fromStatus || '—',
            toStatus: a.toStatus || '—',
            operatorId: a.operatorId || '—',
            content: a.content || ''
          };
        });
        return { status: 0, msg: '', data: { items: items, total: page.total || 0 } };
    body:
      - type: wrapper
        className: "m-b"
        body:
          - type: tpl
            tpl: '<div class="text-muted">共 ${total} 条操作记录</div>'
      - type: each
        name: items
        placeholder: '<div class="text-center text-muted p-4">暂无操作日志</div>'
        body:
          - type: wrapper
            className: "m-b-sm p-b-sm"
            body:
              - type: tpl
                tpl: '<div class="flex justify-between"><span><strong style="color:${typeColor}">[${typeLabel}]</strong> ${fromStatus} → ${toStatus}</span><span class="text-muted text-sm">${createTime}</span></div>'
              - type: tpl
                tpl: '<div class="text-muted text-sm p-t-xs">操作人: ${operatorId} · ${content}</div>'
