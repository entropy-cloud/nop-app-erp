# CS 工单看板（F13 非标准视图，plan 2026-07-22-0845-3 §Phase 1）。
# 6 列 crud（按 erp-cs/ticket-status 字典：NEW/ASSIGNED/IN_PROGRESS/RESOLVED/CLOSED/CANCELLED）
# + 行级状态机 row-action（Phase 0 Explore (a) 降级裁决）。
# 经既有 @BizMutation：assign / start / resolve / close / reopen / cancel（ErpCsTicketBizModel）。
# SLA 超时卡片 🔴 标记（deadlineDateTime < now 且 isSlaCompleted=false）+ 待分派列（NEW）高亮。
type: page
title: "工单看板"
remark: "6 列状态看板。行级按钮经 ErpCsTicket 状态机 mutation 触发迁移：NEW→assign（分配处理人），ASSIGNED→start，IN_PROGRESS→resolve（含解决说明），RESOLVED→close 或 reopen，CANCELLED/CLOSED 为终态。SLA 超时卡片以 🔴 标记（deadlineDateTime < now 且 isSlaCompleted=false）。"
body:
  - type: form
    name: filterForm
    title: "筛选"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-number
        name: customerId
        label: "客户ID"
        placeholder: "过滤客户"
        clearable: true
      - type: button
        label: "刷新看板"
        icon: "refresh-cw"
        actionType: reload
        target: "colNew,colAssigned,colInProgress,colResolved,colClosed,colCancelled"

  - type: grid
    className: m-3
    columns:
      # ① NEW 待分派（闪烁高亮，提醒运营响应）
      - type: crud
        name: colNew
        title: "① 新建 (NEW)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        className: "bg-warning-subtle"
        api: &ticketApiTpl
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}s:String,${'$'}c:Long,${'$'}lim:Int){ ErpCsTicket__findPage(filter_status:${'$'}s,filter_customerId:${'$'}c,limit:${'$'}lim){ items{ id code subject priority status assignedToId deadlineDateTime isSlaCompleted customerId } total } }"
            variables:
              s: "NEW"
              c: "${customerId || null}"
              lim: 50
          adaptor: |
            const d = payload.data || {};
            const gql = d.data ? d.data : d;
            const page = gql.ErpCsTicket__findPage || { items: [], total: 0 };
            return { status: 0, msg: '', data: { items: page.items || [], count: page.total || 0 } };
        columns: &ticketColsNew
          - name: code
            label: "单号"
            width: 130
          - name: subject
            label: "主题"
            width: 200
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "URGENT" || priority == "HIGH" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - name: deadlineDateTime
            label: "SLA"
            type: tpl
            tpl: '<span class="${deadlineDateTime && !isSlaCompleted ? "text-danger" : "text-muted"}">${deadlineDateTime ? deadlineDateTime : "—"}</span>'
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "分派"
                level: primary
                size: sm
                actionType: dialog
                dialog:
                  title: "分派工单"
                  body:
                    type: form
                    api:
                      method: post
                      url: /graphql
                      dataType: raw
                      data:
                        query: "mutation(${'$'}id:Long,${'$'}a:String){ ErpCsTicket__assign(ticketId:${'$'}id,assignedToId:${'$'}a){ id status } }"
                        variables:
                          id: "${id}"
                          a: "${assignedToId}"
                    body:
                      - type: input-text
                        name: assignedToId
                        label: "处理人用户ID"
                        placeholder: "分配给处理人（用户ID）"
                reload: colNew,colAssigned

      # ② ASSIGNED 已分派
      - type: crud
        name: colAssigned
        title: "② 已分派 (ASSIGNED)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          <<: *ticketApiTpl
          data:
            query: "query(${'$'}s:String,${'$'}c:Long,${'$'}lim:Int){ ErpCsTicket__findPage(filter_status:${'$'}s,filter_customerId:${'$'}c,limit:${'$'}lim){ items{ id code subject priority status assignedToId deadlineDateTime isSlaCompleted customerId } total } }"
            variables:
              s: "ASSIGNED"
              c: "${customerId || null}"
              lim: 50
        columns:
          - name: code
            label: "单号"
            width: 130
          - name: subject
            label: "主题"
            width: 200
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "URGENT" || priority == "HIGH" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - name: deadlineDateTime
            label: "SLA"
            type: tpl
            tpl: '<span class="${deadlineDateTime && !isSlaCompleted ? "text-danger" : "text-muted"}">${deadlineDateTime ? deadlineDateTime : "—"}</span>'
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "开始"
                level: primary
                size: sm
                confirmText: "确认开始处理？"
                api:
                  method: post
                  url: /graphql
                  dataType: raw
                  data:
                    query: "mutation(${'$'}id:Long){ ErpCsTicket__start(ticketId:${'$'}id){ id status } }"
                    variables:
                      id: "${id}"
                reload: colAssigned,colInProgress

      # ③ IN_PROGRESS 处理中
      - type: crud
        name: colInProgress
        title: "③ 处理中 (IN_PROGRESS)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          <<: *ticketApiTpl
          data:
            query: "query(${'$'}s:String,${'$'}c:Long,${'$'}lim:Int){ ErpCsTicket__findPage(filter_status:${'$'}s,filter_customerId:${'$'}c,limit:${'$'}lim){ items{ id code subject priority status assignedToId deadlineDateTime isSlaCompleted customerId } total } }"
            variables:
              s: "IN_PROGRESS"
              c: "${customerId || null}"
              lim: 50
        columns:
          - name: code
            label: "单号"
            width: 130
          - name: subject
            label: "主题"
            width: 200
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "URGENT" || priority == "HIGH" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - name: deadlineDateTime
            label: "SLA"
            type: tpl
            tpl: '<span class="${deadlineDateTime && !isSlaCompleted ? "text-danger" : "text-muted"}">${deadlineDateTime ? deadlineDateTime : "—"} ${deadlineDateTime && !isSlaCompleted ? "🔴" : ""}</span>'
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "解决"
                level: success
                size: sm
                actionType: dialog
                dialog:
                  title: "标记工单解决"
                  body:
                    type: form
                    api:
                      method: post
                      url: /graphql
                      dataType: raw
                      data:
                        query: "mutation(${'$'}id:Long,${'$'}r:String){ ErpCsTicket__resolve(ticketId:${'$'}id,resolution:${'$'}r){ id status } }"
                        variables:
                          id: "${id}"
                          r: "${resolution}"
                    body:
                      - type: textarea
                        name: resolution
                        label: "解决说明"
                        placeholder: "可选：记录解决方案"
                reload: colInProgress,colResolved

      # ④ RESOLVED 已解决
      - type: crud
        name: colResolved
        title: "④ 已解决 (RESOLVED)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          <<: *ticketApiTpl
          data:
            query: "query(${'$'}s:String,${'$'}c:Long,${'$'}lim:Int){ ErpCsTicket__findPage(filter_status:${'$'}s,filter_customerId:${'$'}c,limit:${'$'}lim){ items{ id code subject priority status assignedToId deadlineDateTime isSlaCompleted customerId } total } }"
            variables:
              s: "RESOLVED"
              c: "${customerId || null}"
              lim: 50
        columns:
          - name: code
            label: "单号"
            width: 130
          - name: subject
            label: "主题"
            width: 200
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "URGENT" || priority == "HIGH" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "关闭"
                level: success
                size: sm
                confirmText: "确认关闭工单？关闭后为终态（终态前 SLA 违约工单需在备注注明超时原因）"
                api:
                  method: post
                  url: /graphql
                  dataType: raw
                  data:
                    query: "mutation(${'$'}id:Long){ ErpCsTicket__close(ticketId:${'$'}id){ id status } }"
                    variables:
                      id: "${id}"
                reload: colResolved,colClosed
              - type: button
                label: "重开"
                level: warning
                size: sm
                confirmText: "确认驳回重开？将退回「处理中」"
                api:
                  method: post
                  url: /graphql
                  dataType: raw
                  data:
                    query: "mutation(${'$'}id:Long){ ErpCsTicket__reopen(ticketId:${'$'}id){ id status } }"
                    variables:
                      id: "${id}"
                reload: colResolved,colInProgress

      # ⑤ CLOSED 已关闭（只读终态）
      - type: crud
        name: colClosed
        title: "⑤ 已关闭 (CLOSED)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          <<: *ticketApiTpl
          data:
            query: "query(${'$'}s:String,${'$'}c:Long,${'$'}lim:Int){ ErpCsTicket__findPage(filter_status:${'$'}s,filter_customerId:${'$'}c,limit:${'$'}lim){ items{ id code subject priority status assignedToId deadlineDateTime isSlaCompleted customerId } total } }"
            variables:
              s: "CLOSED"
              c: "${customerId || null}"
              lim: 50
        columns:
          - name: code
            label: "单号"
            width: 130
            className: text-muted
          - name: subject
            label: "主题"
            width: 200
            className: text-muted
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-default">${priority}</span>'

      # ⑥ CANCELLED 已取消（只读终态）
      - type: crud
        name: colCancelled
        title: "⑥ 已取消 (CANCELLED)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          <<: *ticketApiTpl
          data:
            query: "query(${'$'}s:String,${'$'}c:Long,${'$'}lim:Int){ ErpCsTicket__findPage(filter_status:${'$'}s,filter_customerId:${'$'}c,limit:${'$'}lim){ items{ id code subject priority status assignedToId deadlineDateTime isSlaCompleted customerId } total } }"
            variables:
              s: "CANCELLED"
              c: "${customerId || null}"
              lim: 50
        columns:
          - name: code
            label: "单号"
            width: 130
            className: text-muted
          - name: subject
            label: "主题"
            width: 200
            className: text-muted
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-default">${priority}</span>'
