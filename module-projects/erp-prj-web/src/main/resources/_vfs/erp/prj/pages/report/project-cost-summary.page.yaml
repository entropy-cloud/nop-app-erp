type: page
title: "项目成本汇总表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: projectId
        label: "项目ID"
        placeholder: "留空查询全部项目"
      - type: input-date
        name: startDate
        label: "开始日期"
        valueFormat: "YYYY-MM-DD"
      - type: input-date
        name: endDate
        label: "结束日期"
        valueFormat: "YYYY-MM-DD"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpPrjReport__download
              method: post
              responseType: blob
              data:
                reportName: "project-cost-summary"
                renderType: "xlsx"
                data: { projectId: "${projectId}", startDate: "${startDate}", endDate: "${endDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpPrjReport__download
              method: post
              responseType: blob
              data:
                reportName: "project-cost-summary"
                renderType: "pdf"
                data: { projectId: "${projectId}", startDate: "${startDate}", endDate: "${endDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}projectId:BigDecimal,${'$'}startDate:String,${'$'}endDate:String){ ErpPrjReport__renderHtml(reportName:${'$'}reportName,data:{projectId:${'$'}projectId,startDate:${'$'}startDate,endDate:${'$'}endDate}) }"
            variables:
              reportName: "project-cost-summary"
              projectId: "${projectId}"
              startDate: "${startDate}"
              endDate: "${endDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpPrjReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
