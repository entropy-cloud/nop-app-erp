# Project 任务看板（F13 非标准视图，plan 2026-07-22-0845-3 §Phase 1）。
# 4 列 crud（TODO/IN_PROGRESS/DONE/BLOCKED）+ 行级状态机 row-action。
# 经 Phase 0 Explore (a) 降级裁决：不使用拖拽，行级按钮触发既有 @BizMutation
#   startTask / completeTask / blockTask(blockReason) / unblockTask（task-dag.md §4）。
# 优先级颜色（erp-prj/priority 字典）+ BLOCKED 卡片 blockReason 显示。
type: page
title: "任务看板"
remark: "4 列状态看板（待开始 / 进行中 / 已完成 / 阻塞）。行级按钮经 ErpPrjTask 状态机 mutation 触发迁移：TODO→startTask，IN_PROGRESS→completeTask 或 blockTask（dialog 收集阻塞原因），BLOCKED→unblockTask。DONE 列只读。"
body:
  - type: form
    name: filterForm
    title: "筛选"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-number
        name: projectId
        label: "项目ID"
        placeholder: "过滤项目"
        clearable: true
      - type: button
        label: "刷新看板"
        icon: "refresh-cw"
        actionType: reload
        target: "colTodo,colInProgress,colDone,colBlocked"

  - type: grid
    className: m-3
    columns:
      # ① TODO 待开始
      - type: crud
        name: colTodo
        title: "① 待开始 (TODO)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}p:Long,${'$'}lim:Int){ ErpPrjTask__findPage(filter_status:\"TODO\",filter_projectId:${'$'}p,limit:${'$'}lim){ items{ id title priority blockReason plannedEndDate assigneeId status } total } }"
            variables:
              p: "${projectId || null}"
              lim: 50
          adaptor: |
            const d = payload.data || {};
            const gql = d.data ? d.data : d;
            const page = gql.ErpPrjTask__findPage || { items: [], total: 0 };
            return { status: 0, msg: '', data: { items: page.items || [], count: page.total || 0 } };
        columns:
          - name: title
            label: "任务标题"
            width: 200
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "HIGH" || priority == "URGENT" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - name: plannedEndDate
            label: "计划结束"
            type: date
            format: "YYYY-MM-DD"
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "开始"
                level: primary
                size: sm
                confirmText: "确认开始任务？将迁移到「进行中」"
                api:
                  method: post
                  url: /graphql
                  dataType: raw
                  data:
                    query: "mutation(${'$'}id:Long){ ErpPrjTask__startTask(taskId:${'$'}id){ id status } }"
                    variables:
                      id: "${id}"
                messages:
                  success: "任务已开始"
                reload: colTodo,colInProgress

      # ② IN_PROGRESS 进行中
      - type: crud
        name: colInProgress
        title: "② 进行中 (IN_PROGRESS)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}p:Long,${'$'}lim:Int){ ErpPrjTask__findPage(filter_status:\"IN_PROGRESS\",filter_projectId:${'$'}p,limit:${'$'}lim){ items{ id title priority blockReason plannedEndDate assigneeId status } total } }"
            variables:
              p: "${projectId || null}"
              lim: 50
          adaptor: |
            const d = payload.data || {};
            const gql = d.data ? d.data : d;
            const page = gql.ErpPrjTask__findPage || { items: [], total: 0 };
            return { status: 0, msg: '', data: { items: page.items || [], count: page.total || 0 } };
        columns:
          - name: title
            label: "任务标题"
            width: 200
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "HIGH" || priority == "URGENT" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - name: plannedEndDate
            label: "计划结束"
            type: date
            format: "YYYY-MM-DD"
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "完成"
                level: success
                size: sm
                confirmText: "确认完成任务？将迁移到「已完成」"
                api:
                  method: post
                  url: /graphql
                  dataType: raw
                  data:
                    query: "mutation(${'$'}id:Long){ ErpPrjTask__completeTask(taskId:${'$'}id){ id status } }"
                    variables:
                      id: "${id}"
                messages:
                  success: "任务已完成"
                reload: colInProgress,colDone
              - type: button
                label: "阻塞"
                level: danger
                size: sm
                actionType: dialog
                dialog:
                  title: "标记任务阻塞"
                  body:
                    type: form
                    api:
                      method: post
                      url: /graphql
                      dataType: raw
                      data:
                        query: "mutation(${'$'}id:Long,${'$'}r:String){ ErpPrjTask__blockTask(taskId:${'$'}id,blockReason:${'$'}r){ id status } }"
                        variables:
                          id: "${id}"
                          r: "${blockReason}"
                    body:
                      - type: textarea
                        name: blockReason
                        label: "阻塞原因"
                        required: true
                        placeholder: "必填：阻塞原因（后端 ERR_TASK_BLOCK_REASON_REQUIRED 守卫）"
                messages:
                  success: "任务已阻塞"
                reload: colInProgress,colBlocked

      # ③ DONE 已完成（只读）
      - type: crud
        name: colDone
        title: "③ 已完成 (DONE)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}p:Long,${'$'}lim:Int){ ErpPrjTask__findPage(filter_status:\"DONE\",filter_projectId:${'$'}p,limit:${'$'}lim){ items{ id title priority plannedEndDate actualEndDate assigneeId status } total } }"
            variables:
              p: "${projectId || null}"
              lim: 50
          adaptor: |
            const d = payload.data || {};
            const gql = d.data ? d.data : d;
            const page = gql.ErpPrjTask__findPage || { items: [], total: 0 };
            return { status: 0, msg: '', data: { items: page.items || [], count: page.total || 0 } };
        columns:
          - name: title
            label: "任务标题"
            width: 200
            className: text-muted
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-default">${priority}</span>'
          - name: actualEndDate
            label: "实际完成"
            type: date
            format: "YYYY-MM-DD"

      # ④ BLOCKED 阻塞
      - type: crud
        name: colBlocked
        title: "④ 阻塞 (BLOCKED)"
        headerToolbar: []
        footerToolbar: ["statistics"]
        syncLocation: false
        className: "bg-danger-subtle"
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}p:Long,${'$'}lim:Int){ ErpPrjTask__findPage(filter_status:\"BLOCKED\",filter_projectId:${'$'}p,limit:${'$'}lim){ items{ id title priority blockReason plannedEndDate assigneeId status } total } }"
            variables:
              p: "${projectId || null}"
              lim: 50
          adaptor: |
            const d = payload.data || {};
            const gql = d.data ? d.data : d;
            const page = gql.ErpPrjTask__findPage || { items: [], total: 0 };
            return { status: 0, msg: '', data: { items: page.items || [], count: page.total || 0 } };
        columns:
          - name: title
            label: "任务标题"
            width: 200
            className: text-danger
          - name: priority
            label: "优先级"
            type: tpl
            tpl: '<span class="label label-${priority == "HIGH" || priority == "URGENT" ? "danger" : priority == "MEDIUM" ? "warning" : "default"}">${priority}</span>'
          - name: blockReason
            label: "阻塞原因"
            type: tpl
            tpl: '<span class="text-danger">⚠ ${blockReason}</span>'
          - type: operation
            label: "操作"
            buttons:
              - type: button
                label: "解除阻塞"
                level: warning
                size: sm
                confirmText: "确认解除阻塞？将迁移回「进行中」"
                api:
                  method: post
                  url: /graphql
                  dataType: raw
                  data:
                    query: "mutation(${'$'}id:Long){ ErpPrjTask__unblockTask(taskId:${'$'}id){ id status } }"
                    variables:
                      id: "${id}"
                messages:
                  success: "任务已解除阻塞"
                reload: colBlocked,colInProgress
