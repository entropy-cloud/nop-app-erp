type: page
title: "利润表"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-number
        name: periodId
        label: "会计期间ID"
        placeholder: "输入期间ID"
        value: 1
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpFinReport__download
              method: post
              responseType: blob
              data:
                reportName: "income-statement"
                renderType: "xlsx"
                data: { periodId: "${periodId}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpFinReport__download
              method: post
              responseType: blob
              data:
                reportName: "income-statement"
                renderType: "pdf"
                data: { periodId: "${periodId}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}periodId:BigDecimal){ ErpFinReport__renderHtml(reportName:${'$'}reportName,data:{periodId:${'$'}periodId}) }"
            variables:
              reportName: "income-statement"
              periodId: "${periodId}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpFinReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
