type: page
title: "应收应付账龄"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-date
        name: asOfDate
        label: "账龄基准日"
        value: "${NOW()}"
      - type: button
        label: "渲染报表"
        actionType: ajax
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query($reportName:String!,$asOfDate:String){ ErpFinReport__renderHtml(reportName:$reportName,data:{asOfDate:$asOfDate}) }"
            variables: { reportName: "ar-ap-aging", asOfDate: "${asOfDate}" }
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$asOfDate:String){ ErpFinReport__download(reportName:$reportName,renderType:$renderType,data:{asOfDate:$asOfDate}) }"
                variables: { reportName: "ar-ap-aging", renderType: "xlsx", asOfDate: "${asOfDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /graphql
              method: post
              responseType: blob
              data:
                query: "query($reportName:String!,$renderType:String!,$asOfDate:String){ ErpFinReport__download(reportName:$reportName,renderType:$renderType,data:{asOfDate:$asOfDate}) }"
                variables: { reportName: "ar-ap-aging", renderType: "pdf", asOfDate: "${asOfDate}" }
  - type: html
    id: reportContainer
    html: ""
    className: m-3
