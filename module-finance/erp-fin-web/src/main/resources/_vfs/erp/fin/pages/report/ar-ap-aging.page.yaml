type: page
title: "应收应付账龄"
body:
  - type: form
    title: ""
    mode: inline
    className: m-3
    body:
      - type: input-date
        name: asOfDate
        label: "账龄基准日"
        value: "${NOW()}"
        valueFormat: "YYYY-MM-DD"
      - type: button
        label: "渲染报表"
        actionType: reload
        target: "reportService"
      - type: button-toolbar
        buttons:
          - type: button
            label: "下载 XLSX"
            actionType: download
            api:
              url: /p/ErpFinReport__download
              method: post
              responseType: blob
              data:
                reportName: "ar-ap-aging"
                renderType: "xlsx"
                data: { asOfDate: "${asOfDate}" }
          - type: button
            label: "下载 PDF"
            actionType: download
            api:
              url: /p/ErpFinReport__download
              method: post
              responseType: blob
              data:
                reportName: "ar-ap-aging"
                renderType: "pdf"
                data: { asOfDate: "${asOfDate}" }
      - type: service
        name: reportService
        id: reportContainer
        initFetch: false
        api:
          url: /graphql
          method: post
          dataType: raw
          data:
            query: "query(${'$'}reportName:String!,${'$'}asOfDate:String){ ErpFinReport__renderHtml(reportName:${'$'}reportName,data:{asOfDate:${'$'}asOfDate}) }"
            variables:
              reportName: "ar-ap-aging"
              asOfDate: "${asOfDate}"
          adaptor: |
            const d = payload.data || {};
            const html = (d.data ? d.data : d).ErpFinReport__renderHtml || '';
            return { status: 0, msg: '', data: { reportHtml: html } };
        body:
          - type: html
            html: "${reportHtml}"
