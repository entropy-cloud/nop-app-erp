dict.option.label:
  erp-b2b/edi-doc-state:
    '10': To Send
    '20': Sent
    '25': To Cancel
    '30': Cancelled
    '40': Error
    '50': Received
    '60': Acknowledged
    '70': Archived
  erp-b2b/asn-status:
    '10': Received
    '20': Matched
    '30': Received To Stock
    '40': Cancelled
  erp-b2b/edi-direction:
    '10': Outbound
    '20': Inbound
    '30': Both
  erp-b2b/edi-standard:
    '10': UBL
    '20': X12
    '30': EDIFACT
    '40': Custom
  erp-b2b/blocking-level:
    '10': Info
    '20': Warning
    '30': Error
  erp-b2b/mapping-type:
    '10': Material
    '20': Partner
    '30': UOM
  erp-b2b/partner-status:
    '10': Registered
    '20': Testing
    '30': Certified
    '40': Production
    '50': Suspended
    '60': Terminated
  erp-b2b/protocol:
    '10': AS2
    '20': SFTP
    '30': HTTP
    '40': HTTPS
    '50': OFTP2
  erp-b2b/auth-method:
    '10': HMAC
    '20': Basic Auth
    '30': Certificate
    '40': OAuth2
  erp-b2b/credential-type:
    '10': API Key
    '20': Username Password
    '30': Certificate
    '40': SSH Key
  erp-b2b/exchange-direction:
    '10': Outbound
    '20': Inbound
