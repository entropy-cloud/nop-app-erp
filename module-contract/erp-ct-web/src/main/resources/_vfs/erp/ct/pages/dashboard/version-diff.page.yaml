# contract 合同版本对比（F16 P2 复杂页面，plan 2026-07-22-1400-2 §Phase 3，Phase 0 Explore (a) 降级候选 (b)）。
# 经 Phase 0 Explore (a) 裁决：ErpCtContractVersion 仅存储 content（free-text blob）+ 版本元数据
# （versionNo/versionDate/status/approvedBy/approvedAt/isCurrent），无结构化业务字段（totalAmount/startDate/endDate/terms
# 在父实体 ErpCtContract 上，不在版本实体）。因此降级候选 (b)：版本元数据对比表（变更高亮）+
# content 文本并排 <pre> 展示。非 ORM 变更（Non-Goal）。
# 字段名经实时仓库核实：ErpCtContractVersion.versionNo（非 versionNumber）/versionDate/content/status/approvedBy/approvedAt/isCurrent。
# findSiblings 是 protected helper 非 @BizQuery，用标准 ErpCtContractVersion__findList filter contractId。
type: page
title: "合同版本对比"
remark: "选择合同与两个版本（ErpCtContractVersion），对比版本元数据（versionNo/versionDate/status/approvedBy/approvedAt/isCurrent 变更高亮）+ content 文本并排展示。版本实体仅存储 content 文本快照（无结构化业务字段），结构化字段级 diff 需 ORM 变更（归 successor）。"
body:
  - type: form
    name: filterForm
    title: "版本选择"
    mode: inline
    wrapWithPanel: false
    className: m-3
    body:
      - type: input-number
        name: contractId
        label: "合同ID"
        placeholder: "输入合同主键"
        required: true
        clearable: true
      - type: button
        label: "加载版本列表"
        icon: "list"
        actionType: reload
        target: "versionListService"

  # 版本列表 service（选合同后加载该合同的版本）
  - type: service
    name: versionListService
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}lim:Int){ ErpCtContractVersion__findPage(query:{limit:${'$'}lim}){ items{ id contractId versionNo versionDate status approvedBy approvedAt isCurrent } total } }"
        variables:
          lim: 5000
      adaptor: |
        const d = payload.data || {};
        if (d.errors || !d.data) {
          return { status: 0, msg: '', data: { versions: [], options: [], hasData: false } };
        }
        const gql = d.data ? d.data : d;
        const page = gql.ErpCtContractVersion__findPage || { items: [], total: 0 };
        let rows = page.items || [];
        // Client-side filter by contractId
        const cidVal = typeof contractId !== 'undefined' ? contractId : null;
        if (cidVal != null && cidVal !== 0) {
          rows = rows.filter(function(v){ return v.contractId == cidVal; });
        }
        rows.sort(function(a,b){ return (a.versionNo||0) - (b.versionNo||0); });
        const options = rows.map(function(v){
          return { label: 'v' + v.versionNo + ' (' + (v.versionDate ? String(v.versionDate).substring(0,10) : '—') + ', ' + v.status + (v.isCurrent ? ', 当前)' : ')'), value: v.id };
        });
        return {
          status: 0,
          msg: '',
          data: {
            versions: rows,
            options: options,
            hasData: rows.length > 0
          }
        };
    body:
      - type: tpl
        visibleOn: "${!hasData}"
        tpl: '<div class="text-muted p-3">请输入有效的合同ID后点击「加载版本列表」。</div>'
      - type: tpl
        visibleOn: "${hasData}"
        tpl: '<div class="text-muted m-b-sm">该合同共 ${versions.length} 个版本，请在下方选择两个版本进行对比：</div>'
      - type: form
        visibleOn: "${hasData}"
        name: compareForm
        title: "选择对比版本"
        mode: inline
        wrapWithPanel: false
        body:
          - type: select
            name: versionAId
            label: "版本 A"
            source: "${options}"
            required: true
            clearable: true
          - type: select
            name: versionBId
            label: "版本 B"
            source: "${options}"
            required: true
            clearable: true
          - type: button
            label: "对比版本"
            icon: "git-compare"
            actionType: reload
            target: "compareService"
            disabledOn: "${!versionAId || !versionBId || versionAId == versionBId}"

  # 对比 service
  - type: service
    name: compareService
    className: m-3
    api:
      url: /graphql
      method: post
      dataType: raw
      data:
        query: "query(${'$'}aid:Long,${'$'}bid:Long){ va: ErpCtContractVersion__get(id:${'$'}aid){ id versionNo versionDate status approvedBy approvedAt isCurrent content remark } vb: ErpCtContractVersion__get(id:${'$'}bid){ id versionNo versionDate status approvedBy approvedAt isCurrent content remark } }"
        variables:
          aid: "${versionAId || 0}"
          bid: "${versionBId || 0}"
      adaptor: |
        const d = payload.data || {};
        if (d.errors || !d.data) {
          return { status: 0, msg: '', data: { hasCompare: false } };
        }
        const gql = d.data ? d.data : d;
        const va = gql.va || null;
        const vb = gql.vb || null;
        if (!va || !vb) {
          return { status: 0, msg: '', data: { hasCompare: false } };
        }

        // 元数据逐字段对比（变更高亮）
        const metaFields = [
          { key: 'versionNo', label: '版本号' },
          { key: 'versionDate', label: '版本日期', isDate: true },
          { key: 'status', label: '版本状态' },
          { key: 'isCurrent', label: '是否当前版本', isBool: true },
          { key: 'approvedBy', label: '批准人' },
          { key: 'approvedAt', label: '批准时间', isDate: true },
          { key: 'remark', label: '备注' }
        ];
        const fmt = function(v, f){
          if (v == null || v === '') return '—';
          if (f.isDate) return String(v).substring(0, 19).replace('T', ' ');
          if (f.isBool) return v === true || v === 'true' ? '是' : '否';
          return String(v);
        };
        const metaRows = metaFields.map(function(f){
          const aVal = fmt(va[f.key], f);
          const bVal = fmt(vb[f.key], f);
          return {
            field: f.label,
            valueA: aVal,
            valueB: bVal,
            changed: aVal !== bVal
          };
        });

        const changedCount = metaRows.filter(function(r){ return r.changed; }).length;

        return {
          status: 0,
          msg: '',
          data: {
            hasCompare: true,
            va: va,
            vb: vb,
            metaRows: metaRows,
            changedCount: changedCount,
            contentA: va.content || '（无内容）',
            contentB: vb.content || '（无内容）',
            contentDifferent: (va.content || '') !== (vb.content || '')
          }
        };
    body:
      - type: tpl
        visibleOn: "${!hasCompare}"
        tpl: '<div class="text-muted p-3">选择两个不同版本后点击「对比版本」。</div>'
      - type: tpl
        visibleOn: "${hasCompare}"
        tpl: '<h4 class="m-t-md">版本元数据对比（v${va.versionNo} vs v${vb.versionNo}）</h4><div class="text-muted">变更字段数：${changedCount}（变更行高亮黄色）</div>'
      - type: table
        visibleOn: "${hasCompare}"
        source: "${metaRows}"
        columns:
          - { name: field, label: "字段" }
          - name: valueA
            label: "版本 A (v${va.versionNo})"
            type: tpl
            tpl: '<span style="${changed ? \"background:#fef9c3;padding:2px 4px;border-radius:3px;\" : \"\"}">${valueA}</span>'
          - name: valueB
            label: "版本 B (v${vb.versionNo})"
            type: tpl
            tpl: '<span style="${changed ? \"background:#fef9c3;padding:2px 4px;border-radius:3px;\" : \"\"}">${valueB}</span>'
          - name: changed
            label: "变更"
            type: tpl
            tpl: '<span class="label label-${changed ? "warning" : "default"}">${changed ? "已变更" : "一致"}</span>'
      - type: tpl
        visibleOn: "${hasCompare}"
        tpl: '<hr/><h4>版本内容（content）并排对比</h4><div class="text-muted">纯文本展示（版本实体仅存储 content 文本快照）。${contentDifferent ? "<span class=\"label label-warning\">内容不同</span>" : "<span class=\"label label-success\">内容一致</span>"}</div>'
      - type: grid
        visibleOn: "${hasCompare}"
        columns:
          - type: tpl
            tpl: '<div><div class="text-muted">版本 A (v${va.versionNo})</div><pre style="max-height:400px;overflow:auto;background:#f6f8fa;padding:8px;border-radius:4px;font-size:12px;white-space:pre-wrap;word-break:break-all;">${contentA}</pre></div>'
          - type: tpl
            tpl: '<div><div class="text-muted">版本 B (v${vb.versionNo})</div><pre style="max-height:400px;overflow:auto;background:#f6f8fa;padding:8px;border-radius:4px;font-size:12px;white-space:pre-wrap;word-break:break-all;">${contentB}</pre></div>'
