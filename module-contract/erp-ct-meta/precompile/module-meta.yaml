moduleId: erp/ct
version: "1.0.0"
businessDependencies:
  - moduleId: erp/md
    version: "1.0.0"
  - moduleId: erp/pur
    version: "1.0.0"
  - moduleId: erp/sal
    version: "1.0.0"
optionalFeatures:
